<div class="section-panel active" id="panel-rev">
<script id="content-rev" type="text/plain">
REVERSING ~ HCF

<a href="index.html">&lt;&lt;</a>

;il reverse engineering è l'arte di capire come funziona un programma partendo dal suo binario compilato, senza codice sorgente. Si ragiona per abduzione: si formulano ipotesi e si cerca conferma nel codice disassemblato.

;abduzione: sillogismo in cui la premessa maggiore è certa, mentre la premessa minore è probabile — la conclusione è solo probabile ma verificabile.

;metodo: (1) osservi il sistema finito, (2) formuli ipotesi su come è stato progettato, (3) cerchi conferme o smentite testando quelle ipotesi.

@@@
# workflow base
file   nomefile          # tipo di binario
strings nomefile         # stringhe stampabili
ltrace  ./nomefile       # chiamate a librerie a runtime
strace  ./nomefile       # chiamate al kernel a runtime
@@@

;file — identifica il tipo reale del file senza guardare l'estensione. Ti dice: architettura (32/64 bit), ABI (ELF/PE), se è stripped (senza simboli di debug) o meno. I simboli sono i nomi delle funzioni, variabili e file sorgente che il compilatore può inserire nel binario per aiutare il debug.

;se file restituisce solo "data" il binario potrebbe essere offuscato, cifrato o in formato proprietario. Già un indizio.

@@@
# esempi output di file
nomefile: ELF 64-bit LSB executable, x86-64, not stripped
nomefile: ELF 64-bit LSB executable, x86-64, stripped
nomefile: PE32 executable (GUI) Intel 80386
nomefile: gzip compressed data
nomefile: data
@@@

;strings — estrae tutte le stringhe ASCII/Unicode stampabili da un file binario. Anche su binari stripped le stringhe spesso restano intatte. Cerca: messaggi di errore, password hardcoded, URL, path di file, "flag{".

;attenzione: strings non estrae dati cifrati, compressi o offuscati.

@@@
strings nomefile
strings -n 8 nomefile        # solo stringhe >= 8 caratteri
strings nomefile | grep flag  # filtra per keyword
@@@

;analisi statica con radare2 — strumento da terminale per disassemblare e analizzare binari. Curva di apprendimento ripida ma indispensabile in CTF.

@@@
r2 -A nomefile   # apri e analizza automaticamente
afl              # lista funzioni trovate
pdf @ main       # disassembla la funzione main
pdf @ sym.check  # disassembla funzione specifica
s sym.check      # salta (seek) a una funzione
iz               # mostra stringhe nel binario
px 64 @ rsp      # dump 64 byte dallo stack pointer
vv               # modalità visuale interattiva
@@@

;approccio consigliato in radare2: dividi il disassemblato in blocchi separati da ogni CALL. Studia le funzioni una ad una. Le CALL chiudono i blocchi e sono i punti di snodo della logica.

;analisi statica con Ghidra — disassembler + decompiler gratuito. Trasforma il binario in pseudo-codice C leggibile. Consigliato per iniziare perché la decompilazione aiuta a capire la logica senza dover leggere solo assembly.

@@@
# in Ghidra:
# File > Import File > nomefile
# Window > Decompiler   (pseudo-C del binario)
# Symbol Tree > Functions > main   (punto d'inizio)
# Search > For Strings   (trova stringhe nel binario)
@@@

;analisi dinamica con GDB + pwndbg — esegui il binario passo-passo, esamina registri e stack, imposta breakpoint. pwndbg è un plugin che rende GDB molto più leggibile.

@@@
gdb ./nomefile
b main           # breakpoint sulla funzione main
b *0x400806      # breakpoint su indirizzo specifico
r                # run (esegui il programma)
ni               # next instruction (step over)
si               # step into (entra nelle funzioni)
x/s $rdi         # leggi stringa all'indirizzo in rdi
x/20wx $rsp      # dump stack (20 dword in hex)
info registers   # stato di tutti i registri
c                # continua fino al prossimo breakpoint
@@@

;calling convention x86-64 Linux (System V AMD64): i primi 6 argomenti vanno nei registri rdi, rsi, rdx, rcx, r8, r9 in quest'ordine. Il valore di ritorno va in rax. Sapere questo ti permette di capire cosa viene passato a ogni funzione.

;binary patching — modifica diretta dei byte del binario per cambiarne il comportamento senza ricompilare. Caso classico: cambiare un salto condizionale per bypassare un controllo password.

@@@
# esempio: bypassare un check
# nel disassemblato trovi:
#   cmp rax, rbx
#   je  0x401200     ; salta se uguale (check ok)
#
# in hexedit o con python cambi l'opcode:
# je  = 0x74   →   jmp = 0xeb  (salta sempre)
# je  = 0x74   →   jne = 0x75  (salta se diverso)

xxd nomefile | grep -n "74"    # cerca byte 0x74
hexedit nomefile               # modifica interattivo
@@@

;objdump — tool GNU già installato su quasi tutti i sistemi Linux. Utile per un'occhiata rapida senza installare nulla.

@@@
objdump -d nomefile              # disassembla tutto
objdump -d -M intel nomefile     # sintassi Intel (più leggibile)
objdump -d nomefile | grep -A20 "<main>"   # solo main
@@@

<div class="section-panel" id="panel-pwn">
<script id="content-pwn" type="text/plain">
PWN ~ HCF

<a href="index.html">&lt;&lt;</a>

;pwn (exploitation) riguarda lo sfruttamento di vulnerabilità nei programmi per ottenere controllo dell'esecuzione o accesso non autorizzato. Il target classico è sovrascrivere il return address sullo stack per reindirizzare il flusso del programma.

;mindset: ogni input dell'utente è una superficie d'attacco. Cerca dove i dati vanno in memoria senza essere validati. La domanda chiave è: posso far eseguire al programma qualcosa che non dovrebbe?

;prima di tutto: checksec. Mostra le protezioni attive sul binario e guida la scelta della tecnica.

@@@
checksec --file=./vuln

# output tipico:
# RELRO:    Partial RELRO
# Stack:    No canary found    ← overflow classico possibile
# NX:       NX enabled         ← no shellcode sullo stack
# PIE:      No PIE             ← indirizzi fissi, più facile
# RPATH:    No RPATH
@@@

;NX (No-eXecute): lo stack non è eseguibile. Se attivo non puoi mettere shellcode sullo stack — devi usare ROP (Return Oriented Programming). Se disattivo puoi iniettare shellcode direttamente.

;stack canary: valore segreto piazzato prima del return address. Se sovrascritto, il programma termina. Rende più difficili i buffer overflow classici.

;PIE (Position Independent Executable): gli indirizzi cambiano ad ogni esecuzione (come ASLR). Se disattivo gli indirizzi sono fissi e prevedibili.

;vulnerabilità 1 — stack buffer overflow. Un buffer sullo stack viene riempito oltre la sua dimensione, sovrascrivendo il return address. Il programma salta dove diciamo noi.

@@@
# funzioni pericolose da cercare nel disassemblato:
# gets()    → VULNERABILE per definizione, nessun limite
# scanf("%s", buf)  → nessun limite sulla dimensione
# strcpy(dst, src)  → nessun controllo lunghezza
# strcat(dst, src)  → nessun controllo lunghezza

strings ./vuln | grep -E "gets|strcpy|scanf"
objdump -d ./vuln | grep "call.*gets"
@@@

;per sfruttare un overflow serve sapere quanti byte di padding servono prima di sovrascrivere il return address. Si usa un cyclic pattern.

@@@
# con pwntools:
from pwn import *
cyclic(100)
# genera: aaaabaaacaaadaaaeaaafaaagaaahaaai...

# manda il pattern al programma → crash
# il crash address ti dice l'offset esatto:
cyclic_find(0x6161616b)   # → es. offset = 44
@@@

;una volta trovato l'offset costruisci il payload: padding + indirizzo dove vuoi saltare.

@@@
from pwn import *
p = process('./vuln')

offset = 44
target = 0x401196    # indirizzo funzione win() o flag()

payload = b'A' * offset
payload += p64(target)   # little-endian automatico

p.sendline(payload)
p.interactive()
@@@

;vulnerabilità 2 — format string. Se un printf usa direttamente l'input utente come stringa di formato, si può leggere e scrivere memoria arbitraria.

@@@
# VULNERABILE:
printf(user_input)           # l'utente controlla il formato

# SICURO:
printf("%s", user_input)     # formato fisso

# test: manda "%p %p %p %p" come input
# se stampa indirizzi di memoria → vulnerabile

# lettura dallo stack:
"%p"        # stampa un valore come puntatore
"%x"        # stampa un valore in esadecimale
"%7$p"      # stampa il 7° argomento (parametro posizionale)

# scrittura in memoria:
"%n"        # scrive il numero di caratteri stampati finora
@@@

;ROP (Return Oriented Programming) — quando NX è attivo non puoi eseguire shellcode. Si concatenano piccoli frammenti di codice già presenti nel binario (gadget) che terminano con ret, per costruire una catena di esecuzione.

@@@
# cerca gadget nel binario:
ROPgadget --binary ./vuln --rop
ROPgadget --binary ./vuln | grep "pop rdi ; ret"
ROPgadget --binary ./vuln | grep "pop rsi ; pop r15 ; ret"

# per chiamare system("/bin/sh") su x86-64:
# 1. gadget: pop rdi ; ret
# 2. indirizzo stringa "/bin/sh"
# 3. indirizzo di system()
@@@

;pwntools — libreria Python per costruire ed eseguire exploit. Gestisce connessioni, encoding, e interazione con il processo target.

@@@
from pwn import *

# connessione locale o remota
p = process('./vuln')
# p = remote('ctf.example.com', 1337)

# lettura output
p.recvuntil(b'Input: ')

# invio payload
p.sendline(b'A' * 44 + p64(0xdeadbeef))

# shell interattiva dopo l'exploit
p.interactive()
@@@

<div class="section-panel" id="panel-malware">
<script id="content-malware" type="text/plain">
MALWARE ANALYSIS ~ HCF

<a href="index.html">&lt;&lt;</a>

;l'analisi malware è reverse engineering con focus sulla sicurezza: capire cosa fa un campione malevolo senza lasciarlo girare libero. La regola d'oro è l'isolamento — analizza sempre in una sandbox o VM snapshottata.

;due approcci complementari: analisi statica (studia il binario senza eseguirlo) e analisi dinamica (lo esegui in ambiente controllato e osservi il comportamento).

;regola fondamentale: non fidarti mai dell'estensione del file. Una icona di documento non significa che il file sia un PDF.

;--- analisi statica ---

;file + strings — primo passo sempre: identifica il tipo reale del file ed estrai stringhe significative.

@@@
file campione
strings campione
strings campione | grep -iE "http|\.exe|HKEY|cmd|/bin|socket|connect|download"
@@@

;hash del campione — calcola l'hash prima di tutto. Serve per cercare il campione in database pubblici come VirusTotal senza caricarlo (i file caricati su VT sono pubblici).

@@@
md5sum    campione
sha256sum campione    # preferisci sha256

# cerca l'hash su:
# virustotal.com
# malwarebazaar.abuse.ch
# any.run
@@@

;binwalk — cerca firme di formato, file embedded e dati compressi all'interno di un file. Utile per campioni che nascondono payload aggiuntivi o dropper con file allegati.

@@@
binwalk campione          # ricognizione: mostra firme trovate
binwalk -e campione       # estrae automaticamente i file trovati
binwalk -M campione       # analisi ricorsiva sui file estratti
@@@

;analisi struttura PE (Windows) — per eseguibili Windows è fondamentale guardare l'Import Table: dice quali DLL e funzioni usa il programma.

@@@
# import table sospette:
# kernel32.dll  → CreateProcess, WriteFile, VirtualAlloc
# ws2_32.dll    → socket, connect, send, recv  (rete)
# advapi32.dll  → RegSetValue, OpenSCManager  (registry, servizi)
# wininet.dll   → InternetOpen, HttpSendRequest  (HTTP)

# tool: PE-bear (GUI), pecheck (python), readpe (linux)
readpe campione.exe
@@@

;--- analisi dinamica ---

;sandbox online — esegui il campione in ambiente controllato e registra tutto: file creati, connessioni di rete, chiavi di registry modificate, processi figli.

@@@
# any.run      → online, interattivo, free tier disponibile
# cuckoo       → self-hosted, più controllo e privacy
# hybrid-analysis.com → online, report dettagliati

# cosa osservare nel report:
# - network activity  (connessioni, DNS, HTTP)
# - dropped files     (file scritti su disco)
# - persistence       (autorun, task scheduler, servizi)
# - injected processes (process hollowing, dll injection)
@@@

;strace + ltrace — su Linux, intercetta le chiamate al kernel e alle librerie a runtime senza aprire un disassembler.

@@@
strace  ./campione           # syscall del kernel
ltrace  ./campione           # chiamate a funzioni di libreria
strace -e trace=network ./campione   # solo chiamate di rete
strace -e trace=file ./campione      # solo accessi a file
@@@

;Wireshark / tcpdump — cattura il traffico di rete generato dal malware. Cerca connessioni a C2, exfiltrazione di dati, download di payload aggiuntivi.

@@@
tcpdump -i eth0 -w capture.pcap
# apri capture.pcap in Wireshark
# filtri utili:
# http || dns || ftp
# tcp.port == 4444
# ip.dst == x.x.x.x
@@@

;cosa cercare — pattern comportamentali comuni.

@@@
# persistenza:
HKCU\Software\Microsoft\Windows\CurrentVersion\Run
HKLM\Software\Microsoft\Windows\CurrentVersion\Run
# cron job su Linux: /etc/cron*, /var/spool/cron

# evasione:
# - sleep lunghi prima dell'attività malevola
# - controllo se gira in VM (CPUID, registry VMware/VirtualBox)
# - offuscamento stringhe, packer (UPX, custom)

# injection:
# - VirtualAllocEx + WriteProcessMemory + CreateRemoteThread
# - LD_PRELOAD su Linux per hooking di funzioni
@@@

;YARA — linguaggio per scrivere regole di rilevamento basate su stringhe e pattern. Utile per identificare varianti della stessa famiglia di malware.

@@@
rule Rootkit_ProcHider
{
  meta:
    description = "LD_PRELOAD rootkit che nasconde processi via readdir hook"
  strings:
    $s1 = "readdir" ascii
    $s2 = "/proc/%s/stat" ascii
    $s3 = "process_to_filter" ascii
  condition:
    all of them
}

yara regola.yar campione
@@@

;ClamAV — antivirus open source da riga di comando. Utile per un check rapido e per la firma del campione.

@@@
clamscan ./campione
clamscan -r ./directory/     # scansione ricorsiva
freshclam                    # aggiorna il database delle firme
@@@

<div class="section-panel" id="panel-crypto">
<script id="content-crypto" type="text/plain">
CRYPTO ~ HCF

<a href="index.html">&lt;&lt;</a>

;le CTF crypto raramente richiedono di rompere AES o RSA "correttamente". Quasi sempre sfruttano implementazioni difettose, parametri sbagliati o algoritmi classici deboli. La crittografia si rompe nei dettagli.

;mindset: non cercare di forzare la crittografia — cerca l'errore nell'implementazione. "Don't roll your own crypto": chi lo fa sbaglia quasi sempre qualcosa.

;prima di tutto: controlla se il testo è solo encodato (non cifrato). Base64, hex, URL encoding, ROT13 non sono crittografia. CyberChef con la ricetta "Magic" li riconosce automaticamente.

@@@
# riconoscere le codifiche comuni:
# Base64:  caratteri A-Z a-z 0-9 +/ con padding =
# Base32:  solo A-Z e 2-7, padding con ====
# Hex:     solo 0-9 a-f, lunghezza pari
# ROT13:   testo leggibile ma spostato di 13 lettere

echo "SGVsbG8=" | base64 -d          # → Hello
echo "48656c6c6f" | xxd -r -p        # → Hello
echo "Uryyb" | tr 'A-Za-z' 'N-ZA-Mn-za-m'  # ROT13 → Hello
@@@

;--- cifrari classici ---

;caesar cipher — sostituzione con shift fisso sull'alfabeto. Attacco: prova tutti i 25 shift possibili (brute force banale) o analisi delle frequenze.

@@@
python3 -c "
s = 'KHOOR ZRUOG'
for shift in range(26):
    print(shift, ''.join(chr((ord(c)-65-shift)%26+65)
          if c.isalpha() else c for c in s))"
@@@

;vigenère cipher — Caesar con chiave ripetuta. Si rompe con il test di Kasiski per trovare la lunghezza della chiave, poi analisi delle frequenze su ogni sotto-sequenza.

@@@
# strumenti online:
# dcode.fr/vigenere-cipher  → analisi automatica
# guballa.de/vigenere        → cryptanalysis
@@@

;XOR cipher — operazione logica bit a bit usatissima per cifratura semplice. Se la chiave è corta o nota in parte si recupera facilmente.

@@@
python3 -c "
ct = bytes.fromhex('1a2b3c4d5e6f')
key = b'KEY'
pt = bytes(c ^ key[i % len(key)] for i,c in enumerate(ct))
print(pt)"

# XOR property: se conosci pt e ct puoi trovare key
# key = ct XOR pt
@@@

;--- errori comuni nella crittografia moderna ---

;RSA — si rompe quasi sempre per errori di implementazione, non per forza bruta.

@@@
# errore 1: n piccolo o fattorizzabile
# cerca n su factordb.com → se fattorizzato trovi p e q

# errore 2: esponente e=3 con plaintext piccolo
# se m^3 < n → m = cube_root(c)
# python: from gmpy2 import iroot; m, exact = iroot(c, 3)

# errore 3: stesso n usato due volte con e diversi (CRT attack)
# errore 4: due chiavi con n1,n2 che condividono un fattore
# gcd(n1, n2) → p comune!

# tool automatico:
# RsaCtfTool: python3 RsaCtfTool.py --publickey key.pem --uncipherfile ct.bin
# dcode.fr/rsa-cipher
@@@

;AES-ECB — la modalità ECB cifra ogni blocco di 16 byte indipendentemente. Blocchi identici in chiaro producono blocchi identici in cifrato. Visibile nelle immagini cifrate con ECB: il pattern rimane riconoscibile.

@@@
# riconoscere ECB: se il ciphertext ha blocchi ripetuti ogni 16 byte → ECB
# attacco chosen-plaintext: controlli il prefisso del testo in chiaro
# e puoi dedurre il contenuto blocco per blocco

python3 -c "
ct = bytes.fromhex('aabbccdd...')
blocks = [ct[i:i+16] for i in range(0, len(ct), 16)]
print('ECB detectato!' if len(blocks) != len(set(blocks)) else 'ok')"
@@@

;nonce riutilizzato (AES-CTR / ChaCha20) — se lo stesso nonce viene usato due volte con la stessa chiave, lo XOR dei due ciphertext è uguale allo XOR dei due plaintext. Basta conoscere uno dei due testi.

@@@
# proprietà fondamentale:
# ct1 = pt1 XOR keystream
# ct2 = pt2 XOR keystream
# ct1 XOR ct2 = pt1 XOR pt2

# se conosci pt1:
# pt2 = ct1 XOR ct2 XOR pt1

python3 -c "
ct1 = bytes.fromhex('...')
ct2 = bytes.fromhex('...')
pt1 = b'known plaintext  '
pt2 = bytes(a^b^c for a,b,c in zip(ct1,ct2,pt1))
print(pt2)"
@@@

;hash length extension — alcune funzioni hash (MD5, SHA1, SHA256) sono vulnerabili se usate come MAC nel modo sbagliato: HMAC(key, msg) = hash(key || msg).

@@@
# se il server calcola: hash(secret || data)
# e conosci len(secret) e hash(secret || data)
# puoi calcolare hash(secret || data || padding || extra)
# senza conoscere secret

# tool: hashpumpy (python), hash_extender
pip install hashpumpy
@@@

from Crypto.Util.number import long_to_bytes, bytes_to_long

;le sfide General (o Misc) sono il jolly della CTF: steganografia, OSINT, forensics, coding challenge e tutto ciò che non rientra nelle altre categorie. Richiedono creatività e approccio laterale.

;mindset: "la flag è nascosta da qualche parte — devi sapere dove guardare". Se qualcosa sembra strano (un file troppo grande, metadati sospetti, output inaspettato) è lì.

;workflow base per ogni file ricevuto.

@@@
file       nomefile        # tipo reale
strings    nomefile        # stringhe stampabili
exiftool   nomefile        # metadati (Author, Comment, GPS...)
binwalk    nomefile        # file nascosti all'interno
xxd nomefile | tail        # guarda anche i byte finali del file
@@@

;--- steganografia ---

;steghide — nasconde/estrae dati in JPEG, BMP, WAV, AU. Supporta password. Prova sempre prima la password vuota.

@@@
steghide info    immagine.jpg        # info senza estrarre
steghide extract -sf immagine.jpg    # estrai (chiede password)
steghide extract -sf immagine.jpg -p ""          # password vuota
steghide extract -sf immagine.jpg -p "password"  # password comune
@@@

;zsteg — analisi LSB specifica per PNG e BMP. Controlla tutti i canali automaticamente (R, G, B, A, combinazioni, bit plane).

@@@
zsteg immagine.png           # analisi automatica tutti i canali
zsteg -a immagine.png        # prova tutti i metodi disponibili
zsteg -E "b1,rgb,lsb,xy" img # estrai canale specifico
@@@

;LSB (Least Significant Bit) steganography — nasconde dati nel bit meno significativo di ogni pixel. Impercettibile all'occhio ma rilevabile da strumenti. Un'immagine PNG da 1MP può contenere ~375KB di dati nascosti.

;stegsolve — analisi visuale dei bit plane di un'immagine. Utile per trovare dati nascosti in canali cromatici specifici.

@@@
java -jar stegsolve.jar
# prova: Image Combiner, Frame Browser, Bit Planes
# filtra i canali R0, G0, B0 (bit meno significativi)
@@@

;binwalk su immagini — cerca file nascosti all'interno di immagini. Comune: ZIP appendato in fondo a un JPEG (un JPEG termina con FF D9 — tutto dopo è ignorato dai viewer ma recuperabile).

@@@
binwalk -e immagine.jpg
# cerca anche manualmente:
xxd immagine.jpg | grep -a "PK"      # firma ZIP
xxd immagine.jpg | grep -a "7z"      # firma 7zip
@@@

;--- forensics ---

;Wireshark — analisi di file PCAP. Segui le stream TCP/HTTP per ricostruire conversazioni e trovare dati trasmessi in chiaro.

@@@
# apri il file .pcap in Wireshark
# Click destro su un pacchetto → Follow → TCP Stream
# File → Export Objects → HTTP  (estrai file trasferiti)
# filtri:
# http.request.method == "POST"
# dns
# ftp-data
# frame contains "flag"
@@@

;Volatility — analisi di memory dump. Estrai processi, connessioni, password, file aperti da un'immagine della RAM.

@@@
vol.py -f dump.mem imageinfo         # identifica versione OS
vol.py -f dump.mem --profile=Win7SP1x64 pslist    # processi
vol.py -f dump.mem --profile=Win7SP1x64 netscan   # connessioni
vol.py -f dump.mem --profile=Win7SP1x64 filescan  # file aperti
vol.py -f dump.mem --profile=Win7SP1x64 dumpfiles -Q 0xaddr -D ./out/
vol.py -f dump.mem --profile=Win7SP1x64 hashdump  # hash password
@@@

;foremost / photorec — file carving da immagini disco: recupera file eliminati o nascosti cercando le magic byte dei formati (JPEG=FFD8FF, ZIP=504B, PDF=%PDF, PNG=89504E47).

@@@
foremost -i disco.img -o output/
photorec disco.img          # interfaccia guidata, più formati
@@@

;--- OSINT ---

;OSINT (Open Source Intelligence) — raccolta di informazioni da fonti pubbliche. In CTF spesso si tratta di trovare informazioni su una persona fittizia, una posizione geografica o un'organizzazione.

<script>
/* ── renderer (stesso parser di proc_hider.html) ── */
function renderSection(contentId, outputId) {
    const raw = document.getElementById(contentId).textContent;
    const lines = raw.split('\n');
    let i = 0;

    while(i < lines.length && lines[i].trim() === '') i++;

    const title = lines[i] ? lines[i].trim() : '';
    if(title && contentId === 'content-rev') document.title = title;
    i++;

    let inner = escCode(title);

    while(i < lines.length){
        const line = lines[i];

        if(line.trim() === '@@@'){
            i++;
            let block = '';
            while(i < lines.length && lines[i].trim() !== '@@@'){
                block += lines[i] + '\n';
                i++;
            }
            i++;
            inner += '<pre class="codeblock">' + escCode(block.replace(/\n$/, '')) + '</pre>';
            continue;
        }

        let textLines = [];
        while(i < lines.length && lines[i].trim() !== '@@@'){
            textLines.push(lines[i]);
            i++;
        }

        const paragraphs = splitParagraphs(textLines);
        if(paragraphs.length > 0){
            inner += '<div class="commento">\n';
            for(const p of paragraphs){
                const cleaned = p.replace(/\n/g, '<br>');
                inner += '<p>' + cleaned + '</p>\n';
            }
            inner += '</div>';
        }
    }

    document.getElementById(outputId).innerHTML =
        '<div class="article">' + inner + '</div>';
}

function escCode(str){
    return str
        .replace(/&(?!(?:amp|lt|gt|quot|#\d+);)/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
}

function splitParagraphs(lines){
    const result = [];
    let current = [];
    for(const line of lines){
        if(line.trim() === ''){
            if(current.length > 0){ result.push(current.join('\n')); current = []; }
        } else {
            current.push(line);
        }
    }
    if(current.length > 0) result.push(current.join('\n'));
    return result;
}

const TABS = ['rev','pwn','malware','crypto','general'];
const rendered = {};

function switchTab(id){
    TABS.forEach(t => {
        document.getElementById('panel-' + t).classList.remove('active');
        document.getElementById('tab-' + t).classList.remove('active');
    });
    document.getElementById('panel-' + id).classList.add('active');
    document.getElementById('tab-' + id).classList.add('active');

    if(!rendered[id]){
        renderSection('content-' + id, 'output-' + id);
        rendered[id] = true;
    }
    window.scrollTo(0, 0);
}

/* render iniziale: solo reversing */
renderSection('content-rev', 'output-rev');
rendered['rev'] = true;
</script>
