<p class="title">section .INTRODUZIONE</p>

;il presente write-up documenta l'analisi statica del meccanismo di persistenza implementato da un malware ELF a 32 bit, condotta tramite disassemblato e pseudocodice Hex-Rays in IDA Free. Dopo la demonizzazione, il campione esegue una fork() che separa il payload principale da un processo watchdog dedicato esclusivamente a garantire la sopravvivenza del malware: quest'ultimo mantiene una copia residente in memoria del proprio eseguibile e verifica periodicamente la presenza del file e del meccanismo di persistenza, ripristinando autonomamente ciò che risulta mancante.

<p class="title">section .METADATI</p>

Tipologia: Malware Linux ELF
Architettura: x86 32 bit
Strumenti utilizzati: IDA Free, Cutter
Denominazione interna: Watchdog di persistenza e self-dropper
file 0e0094d9bd396a6594da8e21911a3982cd737b445f591581560d766755097d92.elf
0e0094d9bd396a6594da8e21911a3982cd737b445f591581560d766755097d92.elf: ELF 32-bit LSB executable, Intel 80386, version 1 (SYSV), statically linked, stripped

<p class="title">_Nota_Metodologica:</p>

;l'analisi dei disassemblati e dei decompilati e' stata condotta interamente a mano, includendo la rinomina delle variabili e delle funzioni. L'intelligenza artificiale e' stata utilizzata esclusivamente nella fase finale del lavoro, come supporto all'analisi: per validare alcune ipotesi interpretative, per effettuare una revisione degli errori sul materiale gia' analizzato e in parte per la stesura del presente write-up.

<p class="title">_Copidosoma_Floridanum:</p>

;questa vespa depone un solo uovo dentro il bruco ospite. Ma quell'uovo, invece di svilupparsi in un solo individuo, si divide (letteralmente un "fork" biologico) in centinaia o migliaia di embrioni geneticamente identici. Da questa divisione nascono due caste distinte:
;larve soldato: sterili, non si sviluppano mai in vespe adulte, non fanno nulla di "produttivo", il loro unico compito è pattugliare l'interno del bruco ospite e attaccare/uccidere eventuali larve di altre specie parassite che tentano di competere per le risorse dell'ospite.
;larve riproduttive: quelle che effettivamente si sviluppano in vespe adulte e completano il ciclo vitale (il "payload" vero e proprio).

<p class="title">section .EXECUTIVE_SUMMARY</p>

;il campione implementa la persistenza separando completamente tale funzione dal payload principale. Dopo la demonizzazione del processo viene eseguita una fork(). Il processo figlio assume il ruolo di watchdog permanente mentre il padre prosegue con l'esecuzione del payload. Il watchdog mantiene una copia residente dell'eseguibile, verifica periodicamente la presenza del file sul filesystem e lo ricrea automaticamente in caso di cancellazione. Parallelamente controlla che il meccanismo di persistenza sia ancora installato, reinstallandolo quando necessario. Questa architettura rende il malware resiliente ai tentativi di rimozione basati esclusivamente sulla cancellazione dell'eseguibile o della configurazione di persistenza.

<p class="title">section .ANALISI_DELLA_TECNICA_DI_PERSISTENZA</p>

<p class="title">_Architettura_Generale:</p>

@@@
                 demonize_and_launch()
                         |
                       fork()
                    _____|_____
                   |           |
               processo     watchdog
                payload         |
                        sleep_with_select(5)
                                |
                         carica il proprio
                         eseguibile in RAM
                                |
                      verifica presenza file
                                |
                +---------------+---------------+
                |                               |
             file presente                 file assente
                |                               |
        verifica persistenza             riscrive il binario
                |                          chmod(0755)
                +---------------+---------------+
                                |
                     persistenza presente?
                                |
                        no -> reinstalla
                                |
                      attesa tramite select()
                                |
                           ciclo infinito
@@@

;Il malware separa completamente il payload dal meccanismo di persistenza.
;Il watchdog rimane attivo indipendentemente dall'esecuzione del payload.
;La cancellazione dell'eseguibile non interrompe il funzionamento del meccanismo di autoripristino.

<p class="title">_Demonize_and_Launch:</p>

@@@
int demonize_and_launch()
{
  int v0; 
  int v2; 
  int v3; 

  if ( fork() > 0 )
    forse_exit(0);
  setsid();
  v0 = sys_ugetrlimit_wrapper();
  if ( v0 >= 0 )
  {
    do
    {
      v2 = v0--;
      close(v2);
    }
    while ( v0 != -1 );
  }
  umask(23);
  return v3;
}
@@@

;prima ancora della fork() che separa payload e watchdog, il malware invoca demonize_and_launch(), che implementa una daemonizzazione UNIX classica a fork singolo. Il processo iniziale esegue un fork() e termina immediatamente nel ramo padre. Il figlio richiama poi setsid() per diventare session leader di una nuova sessione, chiude sistematicamente tutti i file descriptor ereditati (da quello più alto fino a 0, ricavati tramite il limite RLIMIT_NOFILE) e imposta la umask a 027, restringendo i permessi di default sui file che verrà a creare.
;va notato che questo fork è concettualmente distinto da quello analizzato in precedenza in main(): il primo realizza la daemonizzazione in senso classico, mentre il secondo separa esplicitamente il ramo payload dal ramo watchdog. Non si tratta quindi di un "doppio fork", bensì di due fork distinti con finalità differenti: daemonizzazione pulita del processo, la prima; biforcazione dei ruoli operativi, la seconda.

<p class="title">_Separazione_Dei_Ruoli:</p>

;la prima operazione significativa consiste nella creazione di un nuovo processo tramite fork(). Da questo punto il malware divide le proprie responsabilità in due rami distinti.

@@@
v4 = fork();

if (!v4)
{
    ...
    while (1)
    {
        ...
    }
}
@@@

;fork() restituisce 0 nel processo figlio e il PID del figlio nel processo padre.
;il processo figlio entra in un ciclo infinito dedicato esclusivamente alla persistenza.
;il processo padre continua l'esecuzione del payload senza occuparsi del mantenimento del file.
;questa scelta riduce l'accoppiamento tra le varie componenti del malware. Il payload può terminare o essere interrotto senza compromettere il meccanismo incaricato di preservare la presenza del campione sul sistema.

<p class="title">_Caricamento_Del_Binario_In_Memoria:</p>

;prima di iniziare il monitoraggio, il watchdog acquisisce una copia completa del proprio eseguibile.

@@@
load_file_global_buffer(*argv);
@@@

;argv[0] contiene il percorso dell'eseguibile attualmente in esecuzione.
;l'intero file viene letto e mantenuto in un buffer residente in memoria.
;la copia in memoria costituisce la sorgente utilizzata per eventuali ricostruzioni del file.
;questa scelta elimina la dipendenza dal filesystem. Una volta acquisita la copia del binario, il malware non necessita più del file originale per ripristinarsi.

<p class="title">_Watchdog_Del_File:</p>

;il processo figlio esegue un controllo periodico sull'esistenza dell'eseguibile.

@@@
v14[1] = &argc;
  v3 = argv;
  demonize_and_launch();
  v4 = fork();
  if ( !v4 )
  {
    sleep_with_select(5);
    load_file_global_buffer(*v3);

    while ( 1 )
    {
      if ( file_exists() )
      {
        if ( check_persistenza() )
          goto LABEL_4;
      }
      else
      {
        write_file_and_chmod();
        if ( check_persistenza() )
          goto LABEL_4;
      }
      installa_la_persistenza();
LABEL_4:
      sleep_with_select(5);
    }
  }
@@@

;il ciclo rimane attivo per l'intera vita del processo.
;ogni iterazione verifica prima l'integrità del file e successivamente il meccanismo di persistenza.
;lo sleep tra i due controlli consecutivi riduce il consumo di CPU mantenendo un monitoraggio costante.
;l'algoritmo implementa un vero watchdog. Il malware non si limita ad installarsi una sola volta ma continua a verificare che tutti gli elementi necessari alla propria sopravvivenza rimangano presenti.

<p class="title">_Autoripristino_Del_Binario:</p>

;quando il file risulta assente il malware provvede immediatamente alla sua ricostruzione.

@@@
size_t write_file_and_chmod()
{
    fp = fopen(path, "w");

    if (fp)
    {
        fwrite(image, image_size, 1, fp);
        fclose(fp);
        chmod(path, 0755);
    }
}
@@@

;il file viene aperto in modalità "w"rite, creando un nuovo eseguibile o sovrascrivendo quello esistente.
;il contenuto scritto sul filesystem proviene dal buffer residente in memoria.
;la dimensione del file viene ricavata durante il caricamento iniziale dell'eseguibile.
;chmod() imposta i permessi 0755, equivalenti a rwxr-xr-x.
;il file ricreato risulta immediatamente eseguibile.
;il malware non effettua alcuna copia da un percorso alternativo né richiede il download di uno stage remoto. La sorgente del ripristino è sempre la copia residente mantenuta dal watchdog.

<p class="title">_Verifica_Della_Persistenza:</p>

;dopo ogni controllo sul file il malware verifica che il meccanismo di persistenza sia ancora presente.

@@@
if (!check_persistenza())
    installa_la_persistenza();
@@@

;il controllo viene eseguito ad ogni iterazione del watchdog.
;la reinstallazione avviene solamente quando il meccanismo risulta assente.
;il comportamento evita duplicazioni della configurazione di persistenza.

@@@
int check_persistenza()
{
  int v0; 
  int v1; 
  int v2;
  int v4; 
  _DWORD v5[4]; 

  v0 = 0;
  v1 = fopen("/etc/config/crontab", &unk_8088417);
  if ( v1 )
  {
    v5[0] = 0;
    v4 = 0;
    while ( fgets_cs(&v4, v5, v1) != -1 )
    {
      v2 = v4;
      if ( strstr(v4, byte_808EF80) )  //byte_808EF80 è argv[0]
      {
        v0 = 1;
        goto LABEL_6;
      }
    }
    v2 = v4;
    v0 = 0;
LABEL_6:
    free(v2);
    fclose(v1);
  }
  return v0;
}
@@@

;questa funzione ritorna 0 o 1 a seconda se viene trovata nel file /etc/config/crontab la stringa relativa al nome dell'eseguibile.
;implementa un check per vedere se il malware ha già infettato la macchina e implementato la persistenza.
;Il malware non reinstalla continuamente la persistenza ma interviene esclusivamente quando rileva una modifica dello stato del sistema.

@@@
size_t installa_la_persistenza()
{
  size_t result;
  int v1; 

  result = fopen("/etc/config/crontab", "a");
  v1 = result;
  if ( result )
  {
    sub_8078A88(result, "*/5 * * * * %s\n", byte_808EF80);
    return fclose(v1);
  }
  return result;
}
@@@

<p class="title">_Temporizzazione_Del_Watchdog:</p>

;l'attesa tra due iterazioni consecutive viene realizzata mediante una chiamata a select() con timeout.

@@@
sleep_with_select(5);

int sleep_with_select(time_t seconds)
{
    struct timeval timeout;
    timeout.tv_usec = 0;
    timeout.tv_sec = seconds;
    return select(0, 0, 0, 0, &timeout);
}
@@@

;select() riceve tutti i descrittori impostati a NULL.
;l'unico parametro significativo è la struttura timeval utilizzata come timeout.
;tv_sec contiene il numero di secondi da attendere.
;tv_usec è impostato a 0, corrispondente a 0 microsecondi.
;la funzione implementa una pausa periodica senza introdurre un ciclo di busy waiting.
;l'utilizzo di select() permette di ottenere un comportamento equivalente ad una sleep() mantenendo un'interfaccia comunemente impiegata anche nelle applicazioni di rete.

<p class="title">section .ASPETTI_TECNICI_RILEVANTI</p>

;il meccanismo di persistenza presenta tre caratteristiche degne di nota.
;la prima consiste nella netta separazione tra payload e watchdog. Il processo incaricato della persistenza non esegue alcuna attività riconducibile al payload principale.
;la seconda è rappresentata dalla presenza di una copia residente in memoria del binario. Questa scelta consente di rigenerare completamente l'eseguibile anche dopo una sua cancellazione.
;la terza riguarda la verifica continua dello stato del sistema. Il malware controlla periodicamente sia la presenza del file sia quella del meccanismo di persistenza, ripristinando esclusivamente gli elementi mancanti.

<p class="title">section .NOTE_FINALI</p>

;il componente analizzato non implementa una semplice routine di drop dell'eseguibile. La combinazione tra copia residente del binario, monitoraggio continuo del filesystem e reinstallazione della persistenza realizza un meccanismo di auto-ripristino progettato per resistere ai tentativi di bonifica più superficiali.
;la rimozione del solo eseguibile non risulta sufficiente a neutralizzare il malware. Finché il processo watchdog rimane in esecuzione, il campione è in grado di ricostruire autonomamente il proprio file e ripristinare il meccanismo di persistenza qualora venga rimosso.

<p class="title">section .TTP_MITRE_ATTCK</p>

;mapping delle tecniche osservate secondo il framework MITRE ATT&CK. Alcune tecniche non hanno un mapping 1:1 perfetto poiché il comportamento osservato (watchdog di persistenza ridondante) è più granulare di quanto ATT&CK tipicamente cataloghi come singola tecnica.

TA0003: Persistence
T1053.003: Scheduled Task/Job: Cron
Il malware installa e verifica periodicamente una entry in /etc/config/crontab. La rilevanza tecnica: il path non è quello standard Debian/RHEL (/etc/crontab, /var/spool/cron/crontabs/).

TA0005: Stealth
T1222.002: File and Directory Permissions Modification: Linux and Mac File and Directory Permissions Modification
chmod(path, 0755) eseguito dopo ogni riscrittura del binario, per garantire che il file ricostruito resti eseguibile anche se le policy o un tentativo di hardening avessero modificato i permessi.

TA0003 + TA0005, comportamento non pienamente coperto da una singola tecnica
T1053.003 + T1222.002 + comportamento di monitoraggio custom
Concetto: "Redundant/self-healing persistence"
Non esiste una singola tecnica ATT&CK che catturi con precisione il pattern watchdog dedicato che verifica e ripara sia il binario sia il meccanismo di persistenza in un loop indipendente dal payload.

TA0002: Execution
Fork/daemonizzazione (demonize_and_launch() + doppio fork())
Non mappa in modo pulito su una tecnica ATT&CK Linux specifica; è più un pattern implementativo comune ai daemon Unix legittimi (double-fork daemonization) riutilizzato qui per creare due rami di esecuzione indipendenti e sopravvivere alla terminazione del padre.

<p class="title">section .IOC</p>

;indicatori di compromissione ricavabili dall'analisi statica. Alcuni valori (marker string, hash) richiedono estrazione diretta dal binario campione, qui vengono indicati i pattern e le posizioni nel codice da cui estrarli.

<p class="title">_IoC_di_tipo_host-based_(filesystem):</p>

SHA256: 0e0094d9bd396a6594da8e21911a3982cd737b445f591581560d766755097d92
Tipo file: ELF 32-bit LSB executable, Intel 80386, statically linked, stripped
Note: hash del campione analizzato. Utile per lookup su VT/MalwareBazaar e per blocklist EDR/AV.

Path persistenza: /etc/config/crontab
Note: path non standard.

Permessi file: 0755 (rwxr-xr-x) impostati programmaticamente via chmod() dopo ogni riscrittura.
Note: comportamento anomalo se osservato ripetutamente sullo stesso file senza intervento utente.

<p class="title">_IoC_comportamentali_(process-based):</p>

Fork sequenziali con scopi distinti (daemonizzazione + biforcazione dei ruoli)
Descrizione: il binario esegue due fork() in momenti diversi del proprio avvio, con finalità differenti. Il primo fork, interno a demonize_and_launch(), realizza una daemonizzazione SysV classica a fork singolo (padre che termina, figlio che chiama setsid() e si stacca dal controlling terminal). Il secondo fork, in main() subito dopo il ritorno da demonize_and_launch(), separa esplicitamente il processo in due rami persistenti: uno che prosegue con il payload, l'altro che entra nel loop infinito del watchdog. Non si tratta quindi di un pattern di double-fork daemonization in senso tecnico (che prevederebbe un secondo fork subito dopo setsid() per prevenire la riacquisizione di un controlling terminal), ma di due fork distinti e non contigui nel flusso di esecuzione.

Timing periodico ~5s
Descrizione: sleep_with_select(5) invocato ripetutamente in loop.
Utilità per detection: comportamento "beacon-like" a bassa frequenza rilevabile tramite monitoraggio syscall (select() con timeout costante, assenza di file descriptor reali passati).

Verifica ciclica di crontab
Descrizione: apertura ripetuta di /etc/config/crontab in lettura ogni ~5s da parte dello stesso processo.
Utilità per detection: pattern anomalo per un processo non di sistema, rilevabile via auditd su open()/fopen() verso quel path.

<script>
(function(){
    const raw = document.getElementById('content').textContent;
    const lines = raw.split('\n');
    const output = document.getElementById('output');

    let i = 0;

    // salta righe vuote iniziali
    while(i < lines.length && lines[i].trim() === '') i++;

    // prima riga non vuota = titolo
    const title = lines[i] ? lines[i].trim() : '';
    if(title){
        document.title = title;
    }
    i++;

    // costruisce il contenuto dentro un unico div.article
    // il titolo è il nodo di testo iniziale del box
    let inner = escCode(title);
    i; // già avanzato

    while(i < lines.length){
        const line = lines[i];

        // blocco @@@ → codice pre-wrap
        if(line.trim() === '@@@'){
            i++;
            let block = '';
            while(i < lines.length && lines[i].trim() !== '@@@'){
                block += lines[i] + '\n';
                i++;
            }
            i++; // salta @@@ di chiusura
            // il codice viene escapato tranne &lt; &gt; &amp; già scritti
            //inner += escCode(block.replace(/\n$/, ''));
	    inner += '<pre class="codeblock">' + escCode(block.replace(/\n$/, '')) + '</pre>';
            continue;
        }

        // raccoglie testo fino al prossimo @@@
        let textLines = [];
        while(i < lines.length && lines[i].trim() !== '@@@'){
            textLines.push(lines[i]);
            i++;
        }

        const paragraphs = splitParagraphs(textLines);
        if(paragraphs.length > 0){
	    inner += '<div class="commento">\n';
            for (const p of paragraphs){
                const cleaned = p.replace(/\n/g, '<br>');
                inner += '<p>' + cleaned + '</p>\n';
                }
            inner += '</div>';
        }
    }

    output.innerHTML = '<div class="article">' + inner + '</div>';

    // escapa solo il testo codice (non i commenti che possono avere HTML)
    function escCode(str){
        return str
            .replace(/&(?!(?:amp|lt|gt|quot|#\d+);)/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');
    }

    function splitParagraphs(lines){
        const result = [];
        let current = [];
        for(const line of lines){
            if(line.trim() === ''){
                if(current.length > 0){
                    result.push(current.join('\n'));
                    current = [];
                }
            } else {
                current.push(line);
            }
        }
        if(current.length > 0) result.push(current.join('\n'));
        return result;
    }
})();
</script>
