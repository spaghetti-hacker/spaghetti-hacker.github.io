bool check_tracer_pid(void)

{
  int risultato_strncmp;
  FILE *stream;
  char *risultato_fgets;
  long in_FS_OFFSET;
  bool risultato;
  char str [254];
  long canary;

  canary = *(long *)(in_FS_OFFSET + 0x28);
  stream = fopen("/proc/self/status","r");
  if (stream == (FILE *)0x0) {
    risultato = false;
  }
  else {
    do {
      risultato_fgets = fgets(str,0x100,stream);
      if (risultato_fgets == (char *)0x0) {
        fclose(stream);
        risultato = false;
        goto check_canary;
      }
      risultato_strncmp = strncmp(str,"TracerPid:",10);
    } while (risultato_strncmp != 0);
    risultato_strncmp = atoi(str+10);
    fclose(stream);
    risultato = risultato_strncmp != 0;
  }
check_canary:
  if (canary != *(long *)(in_FS_OFFSET + 0x28)) {
                    /* WARNING: Subroutine does not return */
    __stack_chk_fail();
  }
  return risultato;
}

;all'interno di questa routine, una sequenza di byte statici viene copiata in un buffer sullo stack. Questa sequenza rappresenta la password cifrata memorizzata nella sezione dati del binario.

@@@
bool FUN_00101349(char *input)
{
  int iVar1;
  long in_FS_OFFSET;
  char buffer [24];
  long canary;

  canary = *(long *)(in_FS_OFFSET + 0x28);
  strcpy(buffer,&DAT_00102023);
  FUN_00101209(buffer);
  iVar1 = strcmp(input,buffer);
  if (canary != *(long *)(in_FS_OFFSET + 0x28)) {
    __stack_chk_fail();
  }
  return iVar1 == 0;
}

void FUN_00101209(long buffer)
{
  undefined4 i;

<script>
(function(){
    const raw = document.getElementById('content').textContent;
    const lines = raw.split('\n');
    const output = document.getElementById('output');

    let i = 0;

    // salta righe vuote iniziali
    while(i < lines.length && lines[i].trim() === '') i++;

    // prima riga non vuota = titolo
    const title = lines[i] ? lines[i].trim() : '';
    if(title){
        document.title = title + ' | HCF';
    }
    i++;

    // costruisce il contenuto dentro un unico div.article
    // il titolo è il nodo di testo iniziale del box
    let inner = escCode(title);
    i; // già avanzato

    while(i < lines.length){
        const line = lines[i];

        // blocco @@@ → codice pre-wrap
        if(line.trim() === '@@@'){
            i++;
            let block = '';
            while(i < lines.length && lines[i].trim() !== '@@@'){
                block += lines[i] + '\n';
                i++;
            }
            i++; // salta @@@ di chiusura
            // il codice viene escapato tranne &lt; &gt; &amp; già scritti
            inner += escCode(block.replace(/\n$/, ''));
            continue;
        }

        // raccoglie testo fino al prossimo @@@
        let textLines = [];
        while(i < lines.length && lines[i].trim() !== '@@@'){
            textLines.push(lines[i]);
            i++;
        }

        const paragraphs = splitParagraphs(textLines);
        if(paragraphs.length > 0){
	    inner += '<div class="commento">\n';
            for (const p of paragraphs){
                const cleaned = p.replace(/\n/g, '<br>');
                inner += '<p>' + cleaned + '</p>\n';
                }
            inner += '</div>';
        }
    }

    output.innerHTML = '<div class="article">' + inner + '</div>';

    // escapa solo il testo codice (non i commenti che possono avere HTML)
    function escCode(str){
        return str
            .replace(/&(?!(?:amp|lt|gt|quot|#\d+);)/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');
    }

    function splitParagraphs(lines){
        const result = [];
        let current = [];
        for(const line of lines){
            if(line.trim() === ''){
                if(current.length > 0){
                    result.push(current.join('\n'));
                    current = [];
                }
            } else {
                current.push(line);
            }
        }
        if(current.length > 0) result.push(current.join('\n'));
        return result;
    }
})();
</script>
