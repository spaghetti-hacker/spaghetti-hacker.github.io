<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPAGHETTI HACKER</title>
<link rel="icon" type="image/png" href="favicon.png">

<style>
@font-face{
    font-family:gohu;
    src:url("gohu.woff") format("woff");
}

@font-face{
    font-family:'Fixedsys';
    src:url('Fixedsys%20Excelsior%203.01%20Regular.ttf') format('truetype');
}

@font-face{
    font-family:'VT323';
    src:url('VT323-Regular.ttf') format('truetype');
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0c0d10;
    color:#65E903;
    font-family:gohu,"Lucida Console",monospace;
    font-size:clamp(15px,2.6vw,18px);
    line-height:1.6;
    min-height:100vh;
    padding:40px 24px;
}

.wrapper{
    max-width:860px;
    margin:auto;
}

.article{
    background:#0f1a0f;
    border:1px solid #1f2c1b;
    border-radius:6px;
    padding:10px 14px;
    margin-bottom:28px;
    white-space:pre-wrap;
}

.console{
    background:#0f1a0f;
    border:1px solid #1f2c1b;
    border-radius:6px;
    padding:14px;
}

.line{
    white-space:pre-wrap;
    overflow-wrap:anywhere;
}

.dim{
    color:#4f7a35;
}

.mod{
    color:#65E903;
}

.entry{
    padding-left:18px;
    margin:10px 0 18px 0;
    opacity:0;
    transform:translateY(5px);
    transition:.25s;
}

.entry.visible{
    opacity:1;
    transform:none;
}

a{
    color:#65E903;
    text-decoration:none;
}

a:hover{
    color:#4f7a35;
}

.cursor{
    display:inline-block;
    width:.55em;
    height:1em;
    background:#65E903;
    vertical-align:text-bottom;
    animation:blink 1s step-end infinite;
    margin-left:2px;
}

@keyframes blink{
    0%,100%{opacity:1;}
    50%{opacity:0;}
}

.section{
    margin-bottom:18px;
}
</style>
</head>

<body>
<div class="wrapper">

<div class="article">SPAGHETTI HACKER ~ HCF</div>

<div class="console" id="root"></div>

</div>

<script>
const MODULES = [
{
    id:"0x01",
    name:"reverse_engineering",
    file:"get_number.html",
    href:"get_number.html",
    desc:"shellcode-as-png, crackme con vincolo temporizzato"
},
{
    id:"0x02",
    name:"malware_analysis",
    file:"no_elf.html",
    href:"no_elf.html",
    desc:"reverse engineering di un ELF dropper con payload in memoria"
},
{
    id:"0x03",
    name:"ctf_and_vulnerability_research",
    file:"asm.html",
    href:"asm.html",
    desc:"shellcode injection sotto SECCOMP con filename flag fuori misura"
}
];

const root = document.getElementById("root");
const wait = ms => new Promise(r => setTimeout(r, ms));

function addLine(html=""){
    const d = document.createElement("div");
    d.className = "line";
    d.innerHTML = html;
    root.appendChild(d);
    return d;
}

async function typeText(el,text,speed=18){
    for(const ch of text){
        el.innerHTML += ch;
        await wait(speed);
    }
}

async function boot(){

    addLine('<span class="dim">booting spaghetti hacker console...</span>');
    await wait(250);

    addLine('<span class="dim">loading modules...</span>');
    addLine('<span class="dim">                  </span>');
    await wait(350);

    for(const m of MODULES){

        const sec = document.createElement("div");
        sec.className = "section";
        root.appendChild(sec);

        const head = document.createElement("div");
        head.className = "line";
        sec.appendChild(head);

        await typeText(head, `[${m.id}] ${m.name}`);

        const entry = document.createElement("div");
        entry.className = "entry";
        entry.innerHTML =
            `→ <a href="${m.href}">${m.file}</a><br>` +
            `<span class="dim">${m.desc}</span>`;

        sec.appendChild(entry);

        await wait(100);
        entry.classList.add("visible");
        await wait(180);
    }

    await wait(200);
    addLine('root@spaghetti-hacker:~# <span class="cursor"></span>');
}

boot();
</script>
</body>
</html>
