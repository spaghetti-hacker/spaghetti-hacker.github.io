function out(html, cls = "cmd-output"){
    const d = document.createElement("div");
    d.className = cls;
    d.innerHTML = html;
    // inserisce PRIMA della riga prompt (se esiste), altrimenti in fondo
    const prompt = document.getElementById("prompt-line");
    if(prompt) root.insertBefore(d, prompt);
    else root.appendChild(d);
    return d;
}

function outLines(lines){
    lines.forEach(l => out(l));
}

function hr(){
    out(`<span class="dim">               </span>`);
}

/* ── helper: render riga post con immagine sezione ── */
function postHtml(p, extra = ""){
    const imgTag = p.img
        ? `<img class="post-img" src="${p.img}" alt="" aria-hidden="true">`
        : `<span style="margin-right:6px">»</span>`;
    return (
        `<div class="post-row">` +
          `<span class="post-row-img">${imgTag}</span>` +
          `<span class="post-row-body">` +
            `<a href="${p.href}" target="_blank" rel="noopener noreferrer">${p.file}</a>` +
            `<span class="dim"> ;${p.desc}</span>` +
          `</span>` +
        `</div>`
    );
}

/* ── escape html minimale ── */
function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

/* ── esegui un comando ── */
/* se true, runCommand scrolla al primo elemento dell'output invece che al fondo */
let scrollToOutput = false;

async function runCommand(raw){
    const trimmed = raw.trim();
    if(!trimmed) return;

    const shouldScrollToOutput = scrollToOutput;
    scrollToOutput = false;

    /* echo del comando digitato */
    const echoEl = out(`<span style="color:#65E903">root@spaghetti-hacker:~# ${esc(trimmed)}</span>`);

    const [cmd, ...rest] = trimmed.split(/\s+/);
    const args = rest.join(" ") || null;
    const fn = COMMANDS[cmd.toLowerCase()];

    if(fn) await fn(args);
    else out(`<span class="err">comando non trovato: ${esc(cmd)}  (digita <span class="ok">help</span>)</span>`);
    if(cmd.toLowerCase() !== "clear") { hr(); out(""); }

    /* scrolla all'echo del comando (primo elemento inserito) */
    if(shouldScrollToOutput){
        requestAnimationFrame(() => {
            echoEl.scrollIntoView({ behavior: "smooth", block: "start" });
        });
    } else {
        requestAnimationFrame(() => window.scrollTo(0, document.body.scrollHeight));
    }
}

/* ── costruisce la riga prompt fissa ── */
function startShell(){
    const pl = document.createElement("div");
    pl.id = "prompt-line";
    pl.className = "line";

    const label = document.createElement("span");
    label.id = "prompt-label";
    label.innerHTML = `root@spaghetti-hacker:~# `;

    const input = document.createElement("input");
    input.id = "prompt-input";
    input.type = "text";
    input.autocomplete = "off";
    input.autocorrect = "off";
    input.autocapitalize = "off";
    input.spellcheck = false;
    input.setAttribute("aria-label", "bbs shell");

    pl.appendChild(label);
    pl.appendChild(input);
    root.appendChild(pl);

    /* metti il focus subito (solo desktop) */
    if(!/Mobi|Android/i.test(navigator.userAgent)){
        input.focus();
        /* su desktop: click su root → focus shell */
        if(!root._focusListenerAdded){
            root.addEventListener("click", () => {
                const inp = document.getElementById("prompt-input");
                if(inp) inp.focus();
            });
            root._focusListenerAdded = true;
        }
    }

    /* ENTER → esegui */
    input.addEventListener("keydown", e => {
        if(e.key === "Enter"){
            e.preventDefault();
            const val = input.value;
            input.value = "";
            histIdx = -1;
            if(val.trim()){
                history.unshift(val);
                runCommand(val);
            }
            /* scroll alla fine — uso requestAnimationFrame per non triggerare
               l'evento scroll prima che il dropdown abbia finito di aggiornarsi */
            requestAnimationFrame(() => {
                window.scrollTo(0, document.body.scrollHeight);
            });
        }

        /* freccia SU */
        if(e.key === "ArrowUp"){
            e.preventDefault();
            if(histIdx < history.length - 1){
                histIdx++;
                input.value = history[histIdx];
            }
        }

        /* freccia GIÙ */
        if(e.key === "ArrowDown"){
            e.preventDefault();
            if(histIdx > 0){
                histIdx--;
                input.value = history[histIdx];
            } else {
                histIdx = -1;
                input.value = "";
            }
        }

        /* TAB → autocomplete filename o comando */
        if(e.key === "Tab"){
            e.preventDefault();
            const val = input.value;
            const parts = val.trim().split(/\s+/);

            if(parts.length === 1){
                /* completa il comando */
                const partial = parts[0].toLowerCase();
                const matches = Object.keys(COMMANDS).filter(c => c.startsWith(partial));
                if(matches.length === 1) input.value = matches[0] + " ";
                else if(matches.length > 1) out(`<span class="dim">;${matches.join("  ")}</span>`);
            } else {
                /* completa il filename (per cat, ls, find) */
                const partial = parts[parts.length-1].toLowerCase();
                const matches = allPosts
                    .map(p => p.file)
                    .filter(f => f.toLowerCase().startsWith(partial));
                if(matches.length === 1){
                    parts[parts.length-1] = matches[0];
                    input.value = parts.join(" ");
                } else if(matches.length > 1){
                    out(`<span class="dim">;${matches.join("  ")}</span>`);
                }
            }
        }
    });
}

<script>
if(window.matchMedia("(max-width:640px)").matches){

    let openEntry = null;
    let startY = 0, startX = 0;
    let rafId = null;
    let openScrollY = 0;

    let pollDeadline = 0;

    /* polling continuo: gira finché il dropdown è aperto.
       pollDeadline permette al tick di continuare anche quando scrollY
       sembra fermo — su scroll veloce iOS il momentum parte con ritardo */
    function startPoll(){
        if(rafId) cancelAnimationFrame(rafId);
        openScrollY = window.scrollY;
        function tick(){
            if(!openEntry){ rafId = null; return; }
            if(Math.abs(window.scrollY - openScrollY) > 4){
                dropClose();
                return;
            }
            if(pollDeadline && performance.now() < pollDeadline){
                /* siamo nel periodo di grazia post-touchend: continua a girare */
                rafId = requestAnimationFrame(tick);
                return;
            }
            if(pollDeadline && performance.now() >= pollDeadline){
                /* periodo di grazia scaduto senza scroll rilevato: fermati */
                pollDeadline = 0;
                rafId = null;
                return;
            }
            rafId = requestAnimationFrame(tick);
        }
        rafId = requestAnimationFrame(tick);
    }

    /* chiamato al touchend: resetta il riferimento scrollY al momento
       esatto del rilascio del dito ed estende il polling di 600ms */
    function extendPoll(){
        openScrollY = window.scrollY;
        pollDeadline = performance.now() + 600;
        if(!rafId && openEntry) startPoll();
    }

    function stopPoll(){
        if(rafId){ cancelAnimationFrame(rafId); rafId = null; }
    }

    function dropClose(){
        stopPoll();
        if(openEntry){
            openEntry.classList.remove("open");
            openEntry = null;
        }
    }

    function dropOpen(entry){
        if(openEntry && openEntry !== entry) openEntry.classList.remove("open");
        openEntry = entry;
        entry.classList.add("open");
        startPoll();  /* inizia a monitorare lo scroll subito all'apertura */
    }

    window.addEventListener("touchstart", e => {
        startY = e.touches[0].clientY;
        startX = e.touches[0].clientX;
        if(openEntry) openScrollY = window.scrollY;
        pollDeadline = 0;
    }, { passive: true });

    /* touchmove: chiudi appena il dito inizia a scorrere */
    window.addEventListener("touchmove", e => {
        if(!openEntry) return;
        const dy = Math.abs(e.touches[0].clientY - startY);
        const dx = Math.abs(e.touches[0].clientX - startX);
        if(dy > 6 || dx > 6) dropClose();
    }, { passive: true });

    /* scroll classico come ulteriore fallback */
    window.addEventListener("scroll", () => { if(openEntry) dropClose(); }, { passive: true });

    /* touchend: gestione tap */
    document.addEventListener("touchend", e => {
        /* estendi il polling per catturare momentum scroll su flick veloce */
        if(openEntry) extendPoll();
        const t = e.changedTouches[0];
        const dy = Math.abs(t.clientY - startY);
        const dx = Math.abs(t.clientX - startX);

        /* era uno scroll, non un tap → ignora */
        if(dy > 6 || dx > 6) return;

        /* tap su link nel dropdown → esegui onclick o naviga */
        const link = t.target.closest(".dropdown a");
        if(link){
            e.preventDefault();
            dropClose();
            if(link.onclick) link.onclick(e);
            else if(link.href && !link.href.endsWith("#")) window.location.href = link.href;
            return;
        }

        /* tap su nav-entry → toggle dropdown */
        const entry = t.target.closest(".nav-entry");
        if(entry){
            e.preventDefault();
            openEntry === entry ? dropClose() : dropOpen(entry);
            return;
        }

        /* tap fuori da tutto → chiudi */
        if(openEntry) dropClose();

    }, { passive: false });

}
