<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPAGHETTI HACKER BBS</title>
<link rel="icon" type="image/png" href="favicon.png">

<style>
@font-face{
    font-family:gohu;
    src:url("gohu.woff") format("woff");
}

@font-face{
    font-family:'Fixedsys';
    src:url('Fixedsys%20Excelsior%203.01%20Regular.ttf') format('truetype');
}

@font-face{
    font-family:'VT323';
    src:url('VT323-Regular.ttf') format('truetype');
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0c0d10;
    color:#65E903;
    font-family:gohu,"Lucida Console",monospace;
    font-size:clamp(15px,2.6vw,18px);
    line-height:1.6;
    min-height:100vh;
    padding:36px 22px;
}

.wrapper{
    max-width:860px;
    margin:auto;
}

.screen{
    background:#0f1a0f;
    border:1px solid #1f2c1b;
    border-radius:6px;
    padding:16px;
    box-shadow:0 0 10px rgba(101,233,3,.06);
}

.line{
    white-space:pre-wrap;
    overflow-wrap:anywhere;
    min-height:1em;
}

.dim{
    color:#4f7a35;
}

a{
    color:#65E903;
    text-decoration:none;
}

a:hover{
    color:#9cff5f;
}

.block{
    margin-top:18px;
    opacity:0;
    transform:translateY(4px);
    transition:.25s;
}

.block.visible{
    opacity:1;
    transform:none;
}

.cursor{
    display:inline-block;
    width:.55em;
    height:1em;
    background:#65E903;
    vertical-align:text-bottom;
    animation:blink 1s step-end infinite;
    margin-left:2px;
}

@keyframes blink{
    0%,100%{opacity:1;}
    50%{opacity:0;}
}

@media(max-width:640px){
    body{padding:20px 10px;}
    .screen{padding:12px;}
}
</style>
</head>

<body>
<div class="wrapper">
<div class="screen" id="root"></div>
</div>

<script>
const POSTS = [
{
    n:"0x01",
    name:"Reverse Engineering",
    file:"→ get_number.html",
    href:"get_number.html",
    desc:";shellcode-as-png, crackme con vincolo temporizzato"
},
{
    n:"0x02",
    name:"Malware Analysis",
    file:"→ no_elf.html",
    href:"no_elf.html",
    desc:";reverse engineering di un ELF dropper con payload in memoria"
},
{
    n:"0x03",
    name:"CTF / Vuln Research",
    file:"→ asm.html",
    href:"asm.html",
    desc:";shellcode injection sotto SECCOMP con filename flag fuori misura"
}
];

const root = document.getElementById("root");
const wait = ms => new Promise(r => setTimeout(r, ms));

function line(html=""){
    const d = document.createElement("div");
    d.className="line";
    d.innerHTML=html;
    root.appendChild(d);
    return d;
}

async function type(el,text,speed=16){
    for(const c of text){
        el.innerHTML += c;
        await wait(speed);
    }
}

async function boot(){

    let l1 = line();
    await type(l1,"CONNECT 2400 BAUD...");
    await wait(300);

    let l2 = line();
    await type(l2,"HANDSHAKE OK");
    await wait(250);

    line("");

    let title = line();
    await type(title,":: SPAGHETTI HACKER BBS ::");
    line('<span class="dim">sysop: HCF</span>');

    await wait(300);

    for(const p of POSTS){

        const block = document.createElement("div");
        block.className="block";
        block.innerHTML =
            `[${p.n}] ${p.name}<br>` +
            `&nbsp;&nbsp;&nbsp;&nbsp;<a href="${p.href}">${p.file}</a><br>` +
            `<span class="dim">&nbsp;&nbsp;&nbsp;&nbsp;${p.desc}</span>`;

        root.appendChild(block);
        await wait(120);
        block.classList.add("visible");
        await wait(220);
    }

    line("");
    line('<span class="dim">root@spaghetti-hacker:~#</span>');
    line('> <span class="cursor"></span>');
}

boot();
</script>
</body>
</html>
