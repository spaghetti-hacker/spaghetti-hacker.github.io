<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPAGHETTI HACKER BBS</title>
<link rel="icon" type="image/png" href="favicon.png">

<style>
@font-face{
    font-family:gohu;
    src:url("gohu.woff") format("woff");
}

@font-face{
    font-family:'Fixedsys';
    src:url('Fixedsys%20Excelsior%203.01%20Regular.ttf') format('truetype');
}

@font-face{
    font-family:unifont;
    src:url("unifont.woff") format("woff");
}

@font-face{
    font-family:dos;
    src:url("Perfect%20DOS%20VGA%20437.ttf") format("truetype");
}

@font-face{
    font-family:'VT323';
    src:url('VT323-Regular.ttf') format('truetype');
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0c0d10;
    color:#65E903;
    font-family:dos,unifont,VT323,gohu,"Lucida Console",monospace;
    font-size:clamp(18px,2.8vw,20px);
    line-height:1.6;
    min-height:100vh;
    padding:36px 22px;
}

.banner{
    position:relative;
    margin-bottom:18px;
    width:100%;
    max-width:100%;
    overflow:hidden;
}

/* fondamentale: mai forzare scaling fisso */
.banner img{
    width:100%;
    height:auto;
    display:block;
    max-width:100%;
    transform-origin:center;
}

/* desktop effetto “leggero zoom” */
@media (min-width: 768px){
    .banner img.on{
        transform: scale(1.01);
    }
}

/* mobile: zero zoom, zero drift */
@media (max-width: 767px){
    .banner img.on{
        transform: none !important;
    }

    .banner.glitch img{
        transform: none !important;
        animation: none !important;
    }
}


@keyframes crtGlitch {
    0% {
        transform: translate(0, 0);
        filter: none;
    }

    8% {
        transform: translate(-1px, 0);
    }

    10% {
        transform: translate(2px, 0);
    }

    12% {
        transform: translate(-3px, 1px);
    }

    14% {
        transform: translate(1px, -1px);
    }

    18% {
        transform: translate(0, 0);
    }

    35% {
        transform: translate(0, 0);
    }

    36% {
        transform: translate(-6px, 0);
    }

    38% {
        transform: translate(4px, 0);
    }

    40% {
        transform: translate(0, 0);
    }

    65% {
        transform: translate(0, 0);
    }

    66% {
        transform: translate(3px, -2px);
    }

    68% {
        transform: translate(-2px, 2px);
    }

    70% {
        transform: translate(0, 0);
    }

    100% {
        transform: translate(0, 0);
    }
}


.banner img{
    /*animation: crtGlitch 7.5s infinite;*/
}


.ascii{
    margin:0;
    color:#65E903;
    /*font-family:gohu, monospace;*/
    font-family:"Fixedsys";
    font-size:.58em;
    line-height:1.0;
    white-space:pre;
    overflow-x:auto;
    letter-spacing:0;
}

.wrapper{
    max-width:860px;
    margin:auto;
}

.screen{
    /*background:#0f1a0f;*/
    background:#001C1C;
    border:1px solid #001c1c;
    border-radius:6px;
    padding:16px;
    box-shadow:0 0 10px rgba(101,233,3,.06);
}

.line{
    white-space:pre-wrap;
    overflow-wrap:anywhere;
    min-height:1em;
}

.dim{
    color:#4f7a35;
}

a{
    color:#65E903;
    text-decoration:none;
}

a:hover{
    color:#9cff5f;
}

.block{
    margin-top:18px;
    opacity:0;
    transform:translateY(4px);
    transition:.25s;
}

.block.visible{
    opacity:1;
    transform:none;
}

.post{
    margin-top:8px;
    padding-left:18px;
    opacity:0;
    transform:translateY(4px);
    transition:.25s;
}

.post.visible{
    opacity:1;
    transform:none;
}

.cursor{
    display:inline-block;
    width:.55em;
    height:1em;
    background:#65E903;
    vertical-align:text-bottom;
    animation:blink 1s step-end infinite;
    margin-left:2px;
}

@keyframes blink{
    0%,100%{opacity:1;}
    50%{opacity:0;}
}

@media(max-width:640px){
    body{padding:20px 10px;}
    .screen{padding:12px;}
}
</style>
</head>

<body>

<div class="wrapper">
<div class="screen" id="root"></div>
</div>

<script>
const SECTIONS = [
{
    n:"0x01",
    name:"MALWARE ANALYSIS",
    posts:[
        {
            file:"no_elf.html",
            href:"no_elf.html",
            desc:"reverse engineering di un ELF dropper con payload in memoria"
        },
        {
            file:"lotoor.html",
            href:"lotoor.html",
            desc:"campione di malware ELF compilato per architettura ARM 32-bit"
        },
        {
            file:"proc_hider.html",
            href:"proc_hider.html",
            desc:"rootkit userland, usato per nascondere processi"
        }
    ]
},
{
    n:"0x02",
    name:"REVERSE ENGINEERING",
    posts:[
        {
            file:"get_number.html",
            href:"get_number.html",
            desc:"shellcode-as-png, crackme con vincolo temporizzato"
        },
        {
            file:"sigsegv.html",
            href:"sigsegv.html",
            desc:"crackme che implementa tecniche avanzate di anti-debugging attraverso l'uso di segnali SIGSEGV"
        },

            desc:"questo crackme utilizza i segnali UNIX per costruire dinamicamente una password all'’interno di un buffer globale"

},
{
    n:"0x03",
    name:"CTF & VULNERABILITY RESEARCH",
    posts:[
        {
            file:"asm.html",
            href:"asm.html",
            desc:"shellcode injection sotto SECCOMP con filename fuori misura"
        },
        {
            file:"got_overwrite.html",
            href:"got_overwrite.html",

        },
        {
            file:"heap_notes.html",
            href:"heap_notes.html",
            desc:"use-after-free e tcache poisoning"
        }
    ]
}
];

const root = document.getElementById("root");
const wait = ms => new Promise(r => setTimeout(r, ms));

function line(html=""){
    const d = document.createElement("div");
    d.className = "line";
    d.innerHTML = html;
    root.appendChild(d);
    return d;
}

async function type(el,text,speed=16){
    for(const c of text){
        el.innerHTML += c;
        await wait(speed);
    }
}

async function boot(){

    let l1 = line();
    await type(l1,"CONNECT 2400 BAUD...");
    await wait(300);

    let l2 = line();
    await type(l2,"HANDSHAKE OK");
    await wait(250);

    let title = line();
    await wait(300); 
	
    function triggerCRTGlitch(el){
    // probabilità irregolare
    const intensity = Math.random();

    if(intensity < 0.7) return;

    el.classList.add("glitch");

    // durata variabile (cruciale per realism)
    const duration = 120 + Math.random() * 220;

    setTimeout(() => {
        el.classList.remove("glitch");
    }, duration);
    }

    const banner = document.createElement("div");
    banner.className = "banner";
    banner.innerHTML = `<img src="banner22.png" alt="Spaghetti Hacker BBS">`;
    root.appendChild(banner);


    line('<span class="dim">sysop: HCF</span>');

    await wait(300);

    for(const sec of SECTIONS){

        const head = document.createElement("div");
        head.className = "block";
        head.innerHTML = `[${sec.n}] ${sec.name}`;
        root.appendChild(head);

        await wait(120);
        head.classList.add("visible");
        await wait(180);

        for(const p of sec.posts){

            const post = document.createElement("div");
            post.className = "post";

            post.innerHTML =
                `→ <a href="${p.href}">${p.file}</a><br>` +
                `<span class="dim">  ;${p.desc}</span>`;

            root.appendChild(post);

            await wait(90);
            post.classList.add("visible");
            await wait(150);
        }

    }

    line("");
    line('<span>root@spaghetti-hacker:~#</span> <span class="cursor"></span>');
}

boot();
</script>

</body>
</html>
