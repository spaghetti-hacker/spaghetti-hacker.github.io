<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPAGHETTI HACKER BBS</title>
<link rel="icon" type="image/png" href="favicon.png">

<style>
@font-face{
    font-family:gohu;
    src:url("gohu.woff") format("woff");
}

@font-face{
    font-family:'Fixedsys';
    src:url('Fixedsys%20Excelsior%203.01%20Regular.ttf') format('truetype');
}

@font-face{
    font-family:unifont;
    src:url("unifont.woff") format("woff");
}

@font-face{
    font-family:dos;
    src:url("JetBrainsMonoNL-Medium.ttf") format("truetype");
}

@font-face{
    font-family:'VT323';
    src:url('VT323-Regular.ttf') format('truetype');
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0c0d10;
    color:#65E903;
    font-family:VT323,dos,unifont,gohu,monospace;
    font-size:26px;
    letter-spacing:0px;
    line-height:1.2;
    min-height:100vh;
    padding:36px 22px;
}

.banner{
    position:relative;
    margin-bottom:18px;
    width:100%;
    max-width:100%;
    overflow:hidden;
}

.banner img{
    width:100%;
    height:auto;
    display:block;
    max-width:100%;
    transform-origin:center;
}

@media (min-width: 768px){
    .banner img.on{
        transform: scale(1.01);
    }
}

@media (max-width: 767px){
    .banner img.on{
        transform: none !important;
    }
    .banner.glitch img{
        transform: none !important;
        animation: none !important;
    }
}

@keyframes crtGlitch {
    0%   { transform: translate(0,0); filter:none; }
    8%   { transform: translate(-1px,0); }
    10%  { transform: translate(2px,0); }
    12%  { transform: translate(-3px,1px); }
    14%  { transform: translate(1px,-1px); }
    18%  { transform: translate(0,0); }
    35%  { transform: translate(0,0); }
    36%  { transform: translate(-6px,0); }
    38%  { transform: translate(4px,0); }
    40%  { transform: translate(0,0); }
    65%  { transform: translate(0,0); }
    66%  { transform: translate(3px,-2px); }
    68%  { transform: translate(-2px,2px); }
    70%  { transform: translate(0,0); }
    100% { transform: translate(0,0); }
}

.ascii{
    margin:0;
    color:#65E903;
    font-family:"Fixedsys";
    font-size:.58em;
    line-height:1.0;
    white-space:pre;
    overflow-x:auto;
    letter-spacing:0;
}

.wrapper{
    max-width:1024px;
    margin:auto;
}

.screen{
    background:#001C1C;
    border:1px solid #001c1c;
    border-radius:6px;
    padding:16px;
    box-shadow:0 0 10px rgba(101,233,3,.06);
}

.line{
    white-space:pre-wrap;
    overflow-wrap:anywhere;
    min-height:1em;
}

.dim{
    /*color:#3a9070;*/
    color:#65E903;
}

a{
    color:#65E903;
    text-decoration:none;
}

a:hover{
    color:#9cff5f;
}

.block{
    margin-top:18px;
    opacity:0;
    transform:translateY(4px);
    transition:.25s;
}

.block.visible{
    opacity:1;
    transform:none;
}

.post{
    margin-top:8px;
    padding-left:18px;
    opacity:0;
    transform:translateY(4px);
    transition:.25s;
}

.post.visible{
    opacity:1;
    transform:none;
}

/* ── cursore vecchio ── */
.cursor{
    display:inline-block;
    width:.55em;
    height:1em;
    background:#65E903;
    vertical-align:text-bottom;
    animation:blink 1s step-end infinite;
    margin-left:2px;
}

@keyframes blink{
    0%,100%{opacity:1;}
    50%{opacity:0;}
}

/* ── riga prompt interattiva ── */
#prompt-line{
    display:flex;
    align-items:baseline;
    margin-top:0;
    white-space:pre-wrap;
    overflow-wrap:anywhere;
}

#prompt-label{
    flex-shrink:0;
}

#prompt-input{
    background:transparent;
    border:none;
    outline:none;
    color:#65E903;
    font-family:VT323,unifont,VT323,gohu,"Lucida Console",monospace;
    font-size:inherit;
    line-height:inherit;
    letter-spacing:0;
    caret-color:#65E903;
    flex:1;
    min-width:0;
    padding:0;
    /* nasconde il cursore nativo — usiamo quello CSS */
    caret-color:#65E903;
}

/* output dei comandi */
.cmd-output{
    margin-top:2px;
    padding-left:0;
    white-space:pre-wrap;
    overflow-wrap:anywhere;
}

.cmd-echo{
    color:#65E903;
    opacity:.55;
}

.err{
    color:#e05050;
}

.ok{
    color:#65E903;
}

.info{
    color:#65E903;
}

@media(max-width:640px){
    body{
        padding:20px 10px;
        font-size:20px;
    }
    .screen{padding:12px;}
}

.post-img{
    display:inline-block;
    vertical-align:middle;
    height:119px;
    width:auto;
    /*max-width:2.4em;*/
    object-fit:contain;
    /*image-rendering:pixelated;*/
    margin-right:6px;
    position:relative;
    top:-.1em;
}

.post-row{
    display:flex;
    align-items:flex-start;
    gap:0;
    margin-top:6px;
}

.post-row-img{
    flex-shrink:0;
    display:flex;
    align-items:center;
    padding-top:.1em;
}

.post-row-body{
    flex:1;
    min-width:0;
}
</style>
</head>

<body>
<div class="wrapper">
<div class="screen" id="root"></div>
</div>

<script>
/* ═══════════════════════════════════════════════
   DATI
═══════════════════════════════════════════════ */
const SECTIONS = [
{
    n:"0x01",
    name:"MALWARE ANALYSIS",
    img:"logo_ma.png",
    posts:[
        { file:"no_elf.html",      href:"no_elf.html",      desc:"reverse engineering di un ELF dropper con payload in memoria",                                                    date:"2025-01-15" }
    ]
},
{
    n:"0x02",
    name:"REVERSE ENGINEERING",
    img:"logo_re.png",
    posts:[
        { file:"find_string.html",  href:"find_string.html",   desc:"reversing di una semplice routine di ricerca stringa in un array di stringhe",                                                              date:"2026-04-23" },
        { file:"get_number.html",  href:"get_number.html",   desc:"shellcode-as-png, crackme con vincolo temporizzato",                                                              date:"2025-01-28" }
    ]
},
{
    n:"0x03",
    name:"CTF & VULNERABILITY RESEARCH",
    img:"logo_ctf.png",
    posts:[
        { file:"asm.html",         href:"asm.html",          desc:"shellcode injection sotto SECCOMP con filename fuori misura",                                                     date:"2025-03-18" }
    ]
},
{
    n:"0x04",
    name:"LINK & TOOL",
    img:"logo_ctf.png",
    posts:[
        { file:"Searchable Linux Syscall Table",         href:"https://filippo.io/linux-syscall-table/",          desc:"syscall Linux",                                                     date:"2023-03-18" },
        { file:"CyberChef",href:"https://gchq.github.io/CyberChef/",desc:"web app open source per analizzare, convertire e manipolare dati tramite un’interfaccia visuale drag and drop",                                          date:"2023-01-05" },
        { file:"Decompiler Explorer",  href:"https://dogbolt.org/",   desc:"piattaforma web pensata per il reverse engineering che permette di caricare o compilare codice e vedere come diversi decompiler lo ricostruiscono in pseudocodice",                                                                              date:"2023-04-12" }
    ]
}
];

const RECENT_COUNT = 3;
const recentPosts = SECTIONS.flatMap(s => s.posts.map(p => ({ ...p, img: s.img })))
    .filter(p => p.date)
    .sort((a,b) => new Date(b.date) - new Date(a.date))
    .slice(0, RECENT_COUNT);

/* ═══════════════════════════════════════════════
   UTILITÀ DOM
═══════════════════════════════════════════════ */
const root = document.getElementById("root");
const wait = ms => new Promise(r => setTimeout(r, ms));

function line(html = ""){
    const d = document.createElement("div");
    d.className = "line";
    d.innerHTML = html;
    root.appendChild(d);
    return d;
}

async function type(el, text, speed = 16){
    for(const c of text){
        el.innerHTML += c;
        await wait(speed);
    }
}

/* ═══════════════════════════════════════════════
   BOOT SEQUENCE  (identica all'originale)
═══════════════════════════════════════════════ */
async function boot(){
    let l1 = line();
    await type(l1, "CONNECT 2400 BAUD...");
    await wait(300);

    let l2 = line();
    await type(l2, "HANDSHAKE OK");
    await wait(250);

    line();
    await wait(300);

    const banner = document.createElement("div");
    banner.className = "banner";
    banner.innerHTML = `<img src="banner22.png" alt="Spaghetti Hacker BBS">`;
    root.appendChild(banner);

    line('<span class="dim">sysop: HCF</span>');
    line('<span class="dim">hacker artist, reverse engineer, battle programmer, malware & cybersecurity analyst</span>');
    await wait(300);
    startShell();
    COMMANDS.recent();
    COMMANDS.help();
    hr();
}

/* ═══════════════════════════════════════════════
   SHELL INTERATTIVA
═══════════════════════════════════════════════ */

/* storia comandi (freccia su/giù) */
const history = [];
let histIdx = -1;

/* tutti i post flat per ricerca */
const allPosts = SECTIONS.flatMap(s =>
    s.posts.map(p => ({ ...p, section: s.name, n: s.n, img: s.img }))
);

/* ── output helpers ── */
function out(html, cls = "cmd-output"){
    const d = document.createElement("div");
    d.className = cls;
    d.innerHTML = html;
    // inserisce PRIMA della riga prompt
    root.insertBefore(d, document.getElementById("prompt-line"));
    return d;
}

function outLines(lines){
    lines.forEach(l => out(l));
}

function hr(){
    out(`<span class="dim">               </span>`);
}

/* ── helper: render riga post con immagine sezione ── */
function postHtml(p, extra = ""){
    const imgTag = p.img
        ? `<img class="post-img" src="${p.img}" alt="" aria-hidden="true">`
        : `<span style="margin-right:6px">»</span>`;
    return (
        `<div class="post-row">` +
          `<span class="post-row-img">${imgTag}</span>` +
          `<span class="post-row-body">` +
            `<a href="${p.href}" target="_blank" rel="noopener noreferrer">${p.file}</a>${extra}<br>` +
            `<span class="dim">;${p.desc}</span>` +
          `</span>` +
        `</div>`
    );
}

/* ── definizione comandi ── */
const COMMANDS = {

    help(){
        outLines([
            `<span class="info">                     </span>`,
            `<span class="info">comandi disponibili:</span>`,
            `<span class="ok">ls<span>              <span class="dim"> ;elenca sezioni</span>`,
            `<span class="ok">ls &lt;sezione&gt;</span>     <span class="dim">;write-up sezione</span>`,
            `<span class="ok">cat &lt;filename&gt;</span>   <span class="dim">;apre un write-up</span>`,
            `<span class="ok">find &lt;keyword&gt;</span>   <span class="dim">;cerca keyword</span>`,
            `<span class="ok">recent</span>          <span class="dim"> ;ultimi write-up</span>`,
            `<span class="ok">clear</span>           <span class="dim"> ;pulisce lo schermo</span>`,
            `<span class="ok">help</span>            <span class="dim"> ;questo messaggio</span>`,
            `<span class="ok">whoami</span>          <span class="dim"> ;chi sono?</span>`,
            `<span class="info">                     </span>`,
            `<span class="info">;ls &lt;sezione&gt;, per la sezione si possono usare anche parti del nome</span>`,
       	    `<span class="info">;cat &lt;filename&gt;, si può usare il TAB per completare il filename</span>`,
       	    `<span class="info">;cliccando sui link, le pagine si apriranno in un nuovo tab</span>`,
        ]);
    },

    ls(args){
        if(!args){
   		out("  ");
    		outLines(SECTIONS.map(s => {
        	const label = s.name === "LINK & TOOL" ? "resources" : "write-up";
        	return `[${s.n}] <span class="ok">${s.name}</span>  <span class="dim">;${s.posts.length} ${label}</span>`;
    		}));
    	return;
	}
        /* ls <id sezione> — accetta "0x01", "01", "1", o nome parziale */
        const q = args.toLowerCase();
        const sec = SECTIONS.find(s =>
            s.n.toLowerCase() === q ||
            s.n.replace("0x","").toLowerCase() === q.replace("0x","") ||
            s.name.toLowerCase().includes(q)
        );
        if(!sec){
            out(`<span class="err">ls: sezione non trovata: ${esc(args)}</span>`);
            return;
        }
        out(`  `);
        out(`<span style="color:#65E903">[${sec.n}] ${sec.name}</span>`);
        if(sec.name === "LINK & TOOL"){
    		out(`<span class="dim">;${sec.posts.length} external resources</span>`);
	} else {
    		out(`<span class="dim">;${sec.posts.length} write-up</span>`);
	}
        sec.posts.forEach(p => {
            out(postHtml({ ...p, img: sec.img }));
        });
    },

    cat(args){
        if(!args){ out(`<span class="err">uso: cat &lt;filename&gt;</span>`); return; }
        const q = args.toLowerCase().trim();
        const p = allPosts.find(p =>
            p.file.toLowerCase() === q ||
            p.file.toLowerCase().replace(".html","") === q.replace(".html","")
        );
        if(!p){ out(`<span class="err">cat: file non trovato: ${esc(args)}</span>`); return; }
        out(`<span class="dim">;apertura ${p.file}...</span>`);
        setTimeout(() => { window.location.href = p.href; }, 400);
    },

    find(args){
        if(!args){ out(`<span class="err">uso: find &lt;keyword&gt;</span>`); return; }
        const q = args.toLowerCase().trim();
        const results = allPosts.filter(p =>
            p.file.toLowerCase().includes(q) ||
            p.desc.toLowerCase().includes(q) ||
            p.section.toLowerCase().includes(q)
        );
        if(!results.length){
            out(`<span class="dim">;nessun risultato per "${esc(args)}"</span>`);
            return;
        }
        out(" ");
        out(`<span class="info">;${results.length} risultat${results.length===1?"o":"i"} per "${esc(args)}"</span>`); 
        results.forEach(p => {
            out(postHtml(p, `  <span class="dim">[${p.n}]</span>`));
        });
    },

    recent(){
        out(`  `);
        out(`<span style="color:#65E903">[0x00] RECENT</span>`);
	out(`<span class="dim">;ultimi ${RECENT_COUNT} write-up</span>`);
        recentPosts.forEach(p => {
            out(postHtml(p, `  <span class="dim">${p.date}</span>`));
        });
    },

    whoami(){
        out(` `);
        out(`<span class="dim">;Halt and Catch Fire, indicato con la sigla mnemonica di HCF, è un'istruzione fittizia del linguaggio assembly - intesa prevalentemente come uno scherzo - che è stata usata per definire istruzioni solitamente non documentate che portano la cpu in uno stato da cui può essere fatta uscire solo con un reset; solitamente con la sigla HCF si descrive una o più istruzioni non documentate presenti in molte architetture e utilizzate per poter effettuare agevolmente particolari test durante lo sviluppo dei prodotti, ma che non sono da utilizzarsi nella normale operatività.</span>`);
    },

    /*clear(){
        const pl = document.getElementById("prompt-line");
        while(root.firstChild && root.firstChild !== pl)
            root.removeChild(root.firstChild);
    }*/

    clear(){
    root.innerHTML = "";
    boot();
    }
};

/* ── escape html minimale ── */
function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

/* ── esegui un comando ── */
function runCommand(raw){
    const trimmed = raw.trim();
    if(!trimmed) return;

    /* echo del comando digitato */
    out(`<span style="color:#65E903">root@spaghetti-hacker:~# ${esc(trimmed)}</span>`);

    const [cmd, ...rest] = trimmed.split(/\s+/);
    const args = rest.join(" ") || null;
    const fn = COMMANDS[cmd.toLowerCase()];

    if(fn) fn(args);
    else out(`<span class="err">comando non trovato: ${esc(cmd)}  (digita <span class="ok">help</span>)</span>`);
    if(cmd.toLowerCase() !== "clear") { hr(); out(""); }
    /*hr();
    out("");*/
}

/* ── costruisce la riga prompt fissa ── */
function startShell(){
    const pl = document.createElement("div");
    pl.id = "prompt-line";
    pl.className = "line";

    const label = document.createElement("span");
    label.id = "prompt-label";
    label.innerHTML = `root@spaghetti-hacker:~# `;

    const input = document.createElement("input");
    input.id = "prompt-input";
    input.type = "text";
    input.autocomplete = "off";
    input.autocorrect = "off";
    input.autocapitalize = "off";
    input.spellcheck = false;
    input.setAttribute("aria-label", "bbs shell");

    pl.appendChild(label);
    pl.appendChild(input);
    root.appendChild(pl);

    /* metti il focus subito e su ogni click nella screen */
    input.focus();
    document.getElementById("root").addEventListener("click", () => input.focus());

    /* ENTER → esegui */
    input.addEventListener("keydown", e => {
        if(e.key === "Enter"){
            e.preventDefault();
            const val = input.value;
            input.value = "";
            histIdx = -1;
            if(val.trim()){
                history.unshift(val);
                runCommand(val);
            }
            /* scroll alla fine */
            window.scrollTo(0, document.body.scrollHeight);
        }

        /* freccia SU */
        if(e.key === "ArrowUp"){
            e.preventDefault();
            if(histIdx < history.length - 1){
                histIdx++;
                input.value = history[histIdx];
            }
        }

        /* freccia GIÙ */
        if(e.key === "ArrowDown"){
            e.preventDefault();
            if(histIdx > 0){
                histIdx--;
                input.value = history[histIdx];
            } else {
                histIdx = -1;
                input.value = "";
            }
        }

        /* TAB → autocomplete filename o comando */
        if(e.key === "Tab"){
            e.preventDefault();
            const val = input.value;
            const parts = val.trim().split(/\s+/);

            if(parts.length === 1){
                /* completa il comando */
                const partial = parts[0].toLowerCase();
                const matches = Object.keys(COMMANDS).filter(c => c.startsWith(partial));
                if(matches.length === 1) input.value = matches[0] + " ";
                else if(matches.length > 1) out(`<span class="dim">;${matches.join("  ")}</span>`);
            } else {
                /* completa il filename (per cat, ls, find) */
                const partial = parts[parts.length-1].toLowerCase();
                const matches = allPosts
                    .map(p => p.file)
                    .filter(f => f.toLowerCase().startsWith(partial));
                if(matches.length === 1){
                    parts[parts.length-1] = matches[0];
                    input.value = parts.join(" ");
                } else if(matches.length > 1){
                    out(`<span class="dim">;${matches.join("  ")}</span>`);
                }
            }
        }
    });
}

/* ── avvio ── */
boot();
</script>

</body>
</html>
