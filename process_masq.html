<p class="title">_Kallima:</p>

;il Kallima, comunemente noto come farfalla foglia morta, è uno dei casi più studiati di mimetismo animale. Quando apre le ali mostra colori vivaci e appariscenti, arancio, blu, violetto. Quando le chiude scompare. La superficie ventrale delle ali riproduce con precisione anatomica una foglia secca: nervatura centrale, nervature secondarie, picciolo, macchie scure che imitano aree di necrosi fungina, bordi irregolari che simulano il deterioramento. Non imita una foglia sana, non imita una foglia generica. Imita specificamente una foglia che non vale la pena raccogliere. La caratteristica che rende il Kallima straordinario rispetto ad altri insetti mimetici è la scelta del modello. Un predatore che cerca prede vive e integre non si ferma su una foglia morta, la scarta prima ancora di esaminarla. Il Kallima non si nasconde dall'attenzione, si posiziona esattamente nel punto cieco cognitivo del predatore: la categoria di oggetti che vengono visti ma classificati immediatamente come irrilevanti.

<p class="title">section .EXECUTIVE_SUMMARY</p>

;il campione analizzato e' un malware ELF Linux che implementa una tecnica di process masquerading a tre livelli gia' nelle prime istruzioni della funzione main. Il processo modifica la propria identità in user-space tramite manipolazione di argv e utilizzo di prctl(PR_SET_NAME), influenzando la rappresentazione del processo in /proc/PID/cmdline e /proc/PID/comm. L'intera libc e' reimplementata staticamente nel binario, il che elimina le dipendenze dinamiche e rende opaca l'analisi statica iniziale. La struttura generale del campione suggerisce possibili capacità di daemonizzazione, accesso a /proc e comunicazione di rete, che saranno confermate nelle sezioni successive dell’analisi.

<p class="title">section .LIBC_STATICA_CUSTOM</p>

;la prima difficolta' incontrata nell'analisi e' l'assenza totale di importazioni dalla libc standard. L'autore ha riscritto da zero tutte le funzioni per la gestione delle stringhe e della memoria, compilandole staticamente nel binario. La motivazione e' triplice: nessun simbolo importato visibile nell'analisi statica iniziale, nessun hook EDR sulle funzioni libc, portabilita' su qualsiasi versione del kernel senza dipendenze da glibc. Il riconoscimento di alcune funzioni e' avvenuto tramite le costanti caratteristiche delle implementazioni ottimizzate word-by-word.

@@@
while (uVar3 = *src,
      (uVar3 + 0xfefefefefefefeff & ~uVar3 & 0x8080808080808080) == 0) {
    *dst = uVar3;
    src++;
    dst++;
}
@@@

;tecnica standard di null-byte detection su word a 64-bit, permette di copiare 8 byte per iterazione senza loop byte per byte.
;0xfefefefefefefeff e 0x8080808080808080 sono le costanti canoniche del trick documentato in "Hacker's Delight" (Warren, 2002).
;la stessa famiglia di costanti appare in ogni funzione per stringhe del campione. 
;la tabella seguente elenca le varie funzioni identificate:

@@@

strcpy_opt              strcpy
memccpy_opt             memccpy
strlen_cs               strlen

strcat_cs               strcat

readlink_wrapper        readlink
safe_resolve_path       realpath

@@@
 
<p class="title">_syscall_ret_handler:</p>

;ogni syscall grezza del campione e' seguita da una chiamata a questa funzione. Il kernel Linux restituisce gli errori come valori negativi in rax nell'intervallo [-4095, -1]. La libc standard converte questi valori in errno positivo e return -1, ma il campione non linka la libc. Questa funzione reimplementa esattamente quella conversione.

@@@
ulong syscall_ret_handler(ulong raw_result) {
    if (raw_result > 0xfffffffffffff000) {
        *__errno_location() = -(int)raw_result;
        return 0xffffffffffffffff;
    }
    return raw_result;
}
@@@

;0xfffffffffffff000 corrisponde a -4096 in complemento a due.
;qualsiasi valore superiore e' un codice errore kernel negato.
;__errno_location() accede a FS:0x3c, offset di errno nel TLS x86_64.
;il valore di ritorno normalizzato e' sempre -1 in caso di errore.
;il chiamante puo' quindi usare il semplice controllo if (ret < 0).

<p class="title">_safe_resolve_path_e_fd_to_procpath:</p>

;il campione risolve i path in modo canonico usando /proc/self/fd/ come meccanismo intermedio. Il motivo e' che argv[0] puo' essere un path relativo o contenere symlink: per ottenere il path assoluto reale del binario in esecuzione senza chiamare realpath() dalla libc, il campione apre il file con open(), ottiene il fd, costruisce il path /proc/self/fd/<fd> e chiama la syscall readlink() su di esso.

@@@
fd_to_procpath(buffer, fd):
    strcpy(buffer, "/proc/self/fd/")
    itoa(fd, buffer + 14)
@@@

;costruisce /proc/self/fd/N dove N e' il fd in forma decimale.
;/proc/self/fd/N e' un symlink al file reale associato al fd.
;readlink su questo path restituisce il path canonico assoluto.
;itoa e' una sintesi, nel campione la conversione e' implementata inline.
;con due loop: il primo conta le cifre, il secondo scrive i digit da destra a sinistra.
;nessuna funzione itoa e' presente nel binario.
;dopo readlink, safe_resolve_path esegue un controllo anti-TOCTOU confrontando i campi st_dev e st_ino ottenuti rispettivamente da fstat(fd) e stat(path).
;TOCTOU (Time Of Check, Time Of Use) è una race condition che si verifica quando un programma controlla un file tramite il suo percorso (check) e lo utilizza successivamente (use): tra le due operazioni un attaccante può sostituire il file o modificare un symlink, facendo sì che il programma operi su un oggetto diverso da quello verificato. Per mitigare questo problema, il campione apre prima il file ottenendo un file descriptor stabile, quindi confronta i campi st_dev e st_ino restituiti dalle syscall fstat(fd) e stat(path) per verificare che il path risolto identifichi ancora lo stesso inode associato al file già aperto.

@@@
fstat(fd, &stat_fd);
stat(resolved_path, &stat_path);
if (stat_fd.st_dev == stat_path.st_dev &&
    stat_fd.st_ino == stat_path.st_ino) {
    ...
}
@@@

;fstat opera sul fd gia' aperto, non soggetto a race condition.
;stat opera sul path, potrebbe essere stato modificato nel frattempo.
;il confronto di st_dev e st_ino garantisce che fd e path puntino allo stesso inode.
;se i valori divergono, errno viene settato a 40 (ELOOP: too many symbolic links).
;questa scelta di errno e' imprecisa ma deliberata: segnala un problema su symlink.

iVar3 = strlen_cs(*argv);
memset_cs(*argv, 0, iVar3);
memccpy_cs(*argv, "ps aux", 0, iVar3);
memccpy_cs(local_138, "ps aux", 0, 0x10);

;memset azzera argv[0] prima della sovrascrittura per eliminare ogni residuo.
;il primo memccpy sovrascrive argv[0], agisce su /proc/PID/cmdline.
;il secondo memccpy scrive "ps aux" in local_138 (16 byte).
;nel flusso decompilato, il valore passato a PR_SET_NAME deriva direttamente da argv[1], mentre il buffer local_138 appare come struttura di supporto utilizzata durante la costruzione del payload di mascheramento.
;PR_SET_NAME modifica il nome del processo (con argv[1]), che viene esposto in /proc/PID/comm e mostrato da strumenti come top e htop.
;il codice mostra tre interventi distinti sui dati di identificazione del processo:
;sovrascrittura di argv[0] in memoria.
;utilizzo di prctl(PR_SET_NAME, argv[1]) per il nome del processo (comm).
;copia della stringa "ps aux" in buffer locali e globali.
;queste operazioni impattano rispettivamente le rappresentazioni user-space del comando (argv) e il nome del processo (comm), mentre l'effetto su /proc/PID/cmdline riflette direttamente il contenuto di argv nello spazio di memoria del processo.
;la scelta di "ps aux" come nome di copertura non e' casuale. Quando un analista usa ps aux per cercare processi sospetti, il malware si camuffa modificando il proprio nome così che appaia simile a un processo legittimo, rendendo più difficile distinguerlo dagli altri.

<p class="title">section .TTP_MITRE_ATT&CK</p>

;il process masquerading analizzato in questo campione corrisponde alla tecnica T1036.005, Masquerading: Match Legitimate Name or Location del framework MITRE ATT&CK. La tecnica rientra nella tattica Defense Evasion (TA0005). Nel caso specifico il campione agisce su due artefatti distinti: argv[0] in memoria, che alimenta /proc/PID/cmdline, e il comm name tramite prctl PR_SET_NAME, che alimenta /proc/PID/comm. Entrambi i vettori sono esplicitamente citati nella descrizione della tecnica come superfici di mascheramento su sistemi Linux. Le mitigazioni basate su restrizioni del filesystem non sono sufficienti a prevenire questa tecnica, che opera principalmente in memoria. Il rilevamento rimane affidato al confronto tra /proc/PID/exe e /proc/PID/cmdline, artefatto (/proc/PID/exe) più difficile da alterare senza privilegi elevati.

<p class="title">section .NOTE_FINALI</p>

;l'analisi copre esclusivamente la fase di inizializzazione e mascheramento. Il campione presenta ulteriori capacita' non analizzate in questo documento: scansione ciclica di /proc con due callback distinte, comunicazione di rete con socket, daemonizzazione tramite fork, e un'azione periodica ogni sette cicli del loop principale che non e' ancora stata identificata. L'analisi di queste componenti e' in corso.
;il campione mostra caratteristiche compatibili con implementazioni avanzate di gestione low-level di Linux internals. La riscrittura completa della libc, la gestione corretta delle syscall grezze, il controllo anti-TOCTOU in safe_resolve_path e la scelta psicologicamente efficace del nome di copertura suggeriscono familiarità con meccanismi interni di Linux e tecniche di offuscamento a livello processo. Il campione non e' attribuito a nessuna famiglia nota sulla base di questa analisi parziale.

<p class="title">section .PROGRAMMA_IN_C_CHE_RIPRODUCE_PARZIALMENTE_IL_COMPORTAMENTO_OSSERVATO</p>

@@@
/*
;masq_demo.c
;riproduce la tecnica di process masquerading analizzata nel campione.
;usa la libc standard al posto delle funzioni custom del campione originale, il comportamento osservabile e' quasi identico.
;nel campione reale il valore passato a PR_SET_NAME deriva da argv[1], quindi non è necessariamente costante. Il PoC utilizza una stringa fissa per semplificazione dimostrativa.

;compilazione:
;gcc -o masq_demo masq_demo.c

;uso:
;./masq_demo 

;verifica:
;ps aux | grep "ps aux"
;cat /proc/<PID>/cmdline | tr '\0' ' '
;cat /proc/<PID>/comm
*/

#define _GNU_SOURCE
#include <stdio.h>
#include <stdlib.h>
#include <string.h>
#include <unistd.h>
#include <sys/prctl.h>

#define MASK_NAME "ps aux"

int main(int argc, char *argv[])
{

/*
;livello 1: sovrascrittura di argv[0] in memoria.
;agisce su /proc/PID/cmdline, quello che ps aux mostra nella colonna COMMAND.
;il memset preliminare azzera ogni residuo del nome originale prima di scrivere il nome di copertura, esattamente come nel campione.
*/

size_t orig_len = strlen(argv[0]);
memset(argv[0], 0, orig_len);
strncpy(argv[0], MASK_NAME, orig_len);

/*
;livello 2: rinomina del comm name tramite prctl PR_SET_NAME.
;agisce su /proc/PID/comm, quello che top, htop e systemd mostrano come nome del processo. 
*/

prctl(PR_SET_NAME, MASK_NAME, 0, 0, 0);

/*
;a questo punto i tre livelli sono coperti:
;/proc/PID/cmdline  -> "ps aux"
;/proc/PID/comm     -> "ps aux"
;argv[0] in memoria -> "ps aux" (azzerato e riscritto)

;il processo rimane in esecuzione per permettere la verifica.
;il PID viene stampato su stderr per trovarlo facilmente.
*/

fprintf(stderr, "[masq_demo] PID=%d in esecuzione, premi INVIO per uscire\n", getpid());
fprintf(stderr, "[masq_demo] verifica con:\n");
fprintf(stderr, "ps aux | grep 'ps aux'\n");
fprintf(stderr, "cat /proc/%d/cmdline | tr '\\0' ' ' && echo\n", getpid());
fprintf(stderr, "cat /proc/%d/comm\n", getpid());

getchar();
return 0;
}
@@@

(function(){
    const raw = document.getElementById('content').textContent;
    const lines = raw.split('\n');
    const output = document.getElementById('output');

    let i = 0;

    // salta righe vuote iniziali
    while(i < lines.length && lines[i].trim() === '') i++;

    // prima riga non vuota = titolo
    const title = lines[i] ? lines[i].trim() : '';
    if(title){
        document.title = title;
    }
    i++;

    // costruisce il contenuto dentro un unico div.article
    // il titolo è il nodo di testo iniziale del box
    let inner = escCode(title);
    i; // già avanzato

    while(i < lines.length){
        const line = lines[i];

        // blocco @@@ → codice pre-wrap
        if(line.trim() === '@@@'){
            i++;
            let block = '';
            while(i < lines.length && lines[i].trim() !== '@@@'){
                block += lines[i] + '\n';
                i++;
            }
            i++; // salta @@@ di chiusura
            // il codice viene escapato tranne &lt; &gt; &amp; già scritti
            //inner += escCode(block.replace(/\n$/, ''));
	    inner += '<pre class="codeblock">' + escCode(block.replace(/\n$/, '')) + '</pre>';
            continue;
        }

        // raccoglie testo fino al prossimo @@@
        let textLines = [];
        while(i < lines.length && lines[i].trim() !== '@@@'){
            textLines.push(lines[i]);
            i++;
        }

        const paragraphs = splitParagraphs(textLines);
        if(paragraphs.length > 0){
	    inner += '<div class="commento">\n';
            for (const p of paragraphs){
                const cleaned = p.replace(/\n/g, '<br>');
                inner += '<p>' + cleaned + '</p>\n';
                }
            inner += '</div>';
        }
    }

    output.innerHTML = '<div class="article">' + inner + '</div>';

    // escapa solo il testo codice (non i commenti che possono avere HTML)
    function escCode(str){
        return str
            .replace(/&(?!(?:amp|lt|gt|quot|#\d+);)/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');
    }

    function splitParagraphs(lines){
        const result = [];
        let current = [];
        for(const line of lines){
            if(line.trim() === ''){
                if(current.length > 0){
                    result.push(current.join('\n'));
                    current = [];
                }
            } else {
                current.push(line);
            }
        }
        if(current.length > 0) result.push(current.join('\n'));
        return result;
    }
})();
</script>
