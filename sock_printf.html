;è una funzione custom che si comporta come una printf orientata alla rete: invece di scrivere su standard output, formatta una stringa e la trasmette direttamente su un socket, presumibilmente verso un server di comando e controllo.

;essendo la funzione variadica, il compilatore genera un prologo che salva selettivamente i registri XMM usati dal chiamante. 

;una funzione variadica è una funzione che accetta un numero variabile di argomenti, dove solo il primo o i primi sono dichiarati esplicitamente nella firma mentre i restanti vengono passati e letti a runtime tramite i meccanismi va_start, va_arg e va_end. L'esempio più classico è proprio printf, che accetta una format string fissa seguita da quanti argomenti servono a riempirla.

;il valore in al (istruzione 0x00400d24) indica quanti registri floating point sono stati passati, e tramite un calcolo sull'indirizzo base 0x400d7c viene sottratto un offset proporzionale, ottenendo un puntatore che viene poi seguito con un jmp rdi. Questa istruzione salta direttamente nel mezzo di una sequenza di movaps disposti in ordine discendente da xmm7 a xmm0, salvando solo i registri effettivamente usati. È un'ottimizzazione classica del prologo variadico x86-64 System V ABI, generata automaticamente dal compilatore.

@@@

;__va_elem è la struttura che il compilatore costruisce dietro le quinte ogni volta che una funzione variadica viene chiamata, e serve a tenere traccia di dove si trovano gli argomenti extra e quanti ne sono già stati letti. Senza di essa va_arg non saprebbe dove andare a prendere il prossimo valore.

typedef struct {
    unsigned int gp_offset;         // offset ai prossimi GPR salvati.
    unsigned int fp_offset;         // offset ai prossimi XMM salvati.
    void        *overflow_arg_area; // puntatore agli argomenti passati sullo stack.
    void        *reg_save_area;     // puntatore all'area dove sono salvati i registri.
} __va_elem;
@@@

;la stringa formattata viene passata a send con il flag 0x4000, corrispondente a MSG_NOSIGNAL su Linux, che impedisce al processo di ricevere un SIGPIPE nel caso in cui la connessione remota sia caduta, dettaglio tipico di un'applicazione server o di un malware che vuole evitare crash inattesi sulla rete. Il buffer heap viene infine liberato e la funzione restituisce il valore di ritorno di send.

@@@

0x00400e9f      mov eax, dword [rbp - 0xb4]
0x00400ea5      leave
0x00400ea6      ret
@@@

;il socket passato come primo argomento proviene da obj.mainCommSock, una variabile globale che suggerisce una connessione persistente già stabilita altrove nel binario. La format string all'indirizzo 0x40bed0 contiene sequenze di escape ANSI per colorare l'output, il che indica che il destinatario è un terminale interattivo remoto, coerente con uno scenario in cui il malware espone una shell o un'interfaccia testuale verso il proprio C2.

@@@
int sockprintf(int sockfd, const char *fmt, ...) {
    char *buf = malloc(0x800);
    memset(buf, 0, 0x800);

    va_list ap;
    va_start(ap, fmt);

    sym.print(buf, fmt, ap);   

    buf[strlen(buf)] = '\n'; 

    int n = send(sockfd, buf, strlen(buf), 0x4000);

    free(buf);
    return n;
}
@@@

;sockprintf è una funzione che si comporta come una printf ma invece di scrivere su standard output manda il risultato su un socket. Riceve come argomenti un file descriptor di socket, una format string e un numero variabile di argomenti aggiuntivi. Internamente alloca un buffer heap da 2048 byte, lo azzera, costruisce manualmente la va_list seguendo l'ABI System V x86-64, e poi chiama una funzione interna print che si occupa di formattare la stringa nel buffer analogamente a una vsnprintf. Una volta formattata la stringa, aggiunge un carattere newline in fondo, e infine chiama send con il flag MSG_NOSIGNAL per trasmettere il contenuto sul socket senza rischiare di ricevere un SIGPIPE in caso di connessione caduta. Il buffer viene liberato prima di ritornare.

;è una funzione che rappresenta un componente infrastrutturale del malware, progettato per inviare output formattato verso un destinatario remoto in modo robusto e silenzioso. La scelta di implementarla come wrapper variadico custom, anziché usare direttamente dprintf o fprintf, suggerisce che lo sviluppatore volesse un controllo preciso sul comportamento della trasmissione, in particolare evitando crash da SIGPIPE e aggiungendo automaticamente il newline. La presenza di escape ANSI nella format string e di un socket globale persistente indica che questa funzione non è un caso isolato, ma fa parte di un sistema di comunicazione più ampio con il C2, probabilmente un'interfaccia interattiva di tipo shell.

<script>
(function(){
    const raw = document.getElementById('content').textContent;
    const lines = raw.split('\n');
    const output = document.getElementById('output');

    let i = 0;

    // salta righe vuote iniziali
    while(i < lines.length && lines[i].trim() === '') i++;

    // prima riga non vuota = titolo
    const title = lines[i] ? lines[i].trim() : '';
    if(title){
        document.title = title;
    }
    i++;

    // costruisce il contenuto dentro un unico div.article
    // il titolo è il nodo di testo iniziale del box
    let inner = escCode(title);
    i; // già avanzato

    while(i < lines.length){
        const line = lines[i];

        // blocco @@@ → codice pre-wrap
        if(line.trim() === '@@@'){
            i++;
            let block = '';
            while(i < lines.length && lines[i].trim() !== '@@@'){
                block += lines[i] + '\n';
                i++;
            }
            i++; // salta @@@ di chiusura
            // il codice viene escapato tranne &lt; &gt; &amp; già scritti
            //inner += escCode(block.replace(/\n$/, ''));
	    inner += '<pre class="codeblock">' + escCode(block.replace(/\n$/, '')) + '</pre>';
            continue;
        }

        // raccoglie testo fino al prossimo @@@
        let textLines = [];
        while(i < lines.length && lines[i].trim() !== '@@@'){
            textLines.push(lines[i]);
            i++;
        }

        const paragraphs = splitParagraphs(textLines);
        if(paragraphs.length > 0){
	    inner += '<div class="commento">\n';
            for (const p of paragraphs){
                const cleaned = p.replace(/\n/g, '<br>');
                inner += '<p>' + cleaned + '</p>\n';
                }
            inner += '</div>';
        }
    }

    output.innerHTML = '<div class="article">' + inner + '</div>';

    // escapa solo il testo codice (non i commenti che possono avere HTML)
    function escCode(str){
        return str
            .replace(/&(?!(?:amp|lt|gt|quot|#\d+);)/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');
    }

    function splitParagraphs(lines){
        const result = [];
        let current = [];
        for(const line of lines){
            if(line.trim() === ''){
                if(current.length > 0){
                    result.push(current.join('\n'));
                    current = [];
                }
            } else {
                current.push(line);
            }
        }
        if(current.length > 0) result.push(current.join('\n'));
        return result;
    }
})();
</script>
