<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TITOLO | HCF</title>
<link rel="icon" type="image/png" href="favicon.png">
<style>
@font-face{
    font-family:gohu;
    src:url("gohu.woff") format("woff");
}

@font-face{
    font-family:unifont;
    src:url("unifont.woff") format("woff");
}

:root{
    --bg:#0c0d10;
    --border:#001c1c;
    --text:#65E903;
    --muted:#4f7a35;
}

*{ margin:0; padding:0; box-sizing:border-box; }
html{ scroll-behavior:smooth; }

body{
    background:var(--bg);
    color:var(--text);
    font-family:unifont,gohu,"Lucida Console",monospace;
    letter-spacing:0px;
    font-size:clamp(22px,3.2vw,24px);
    line-height:1.5;
    padding:24px 14px;
}

.wrapper{ max-width:1024px; margin:auto; }

.article{
    background:#001C1C;
    border:1px solid var(--border);
    border-radius:6px;
    overflow:hidden;
    width:100%;
    display:block;
    white-space:pre-wrap;
    overflow-wrap:anywhere;
    padding:10px 14px;
    font-size:.95em;
}

.commento{
    color:var(--muted);
    margin:16px 0;
    overflow-wrap:anywhere;
    white-space:normal;
}

.commento p{ margin-bottom:10px; }
.commento p:last-child{ margin-bottom:0; }

a{ color:#65E903; text-decoration:none; }
a:hover{ text-decoration:underline; }

@media(max-width:768px){
    body{ padding:0; font-size:16px; }
    .article{ border-radius:0; }
}
</style>
</head>
<body>
<div class="wrapper">
<div id="output"></div>
</div>

<!--
================================================================
SCRIVI QUI IL TUO CONTENUTO
================================================================

REGOLE:
  - La prima riga non vuota diventa il titolo della pagina
    e l'intestazione del box (es. "NO_ELF ~ HCF")

  - @@@...@@@ → blocco codice/assembly (pre-wrap, sfondo scuro)

  - Testo normale → commento (colore muted, paragrafi separati
    da righe vuote)

  - I link si scrivono normalmente in HTML: <a href="...">testo</a>
    Il parser li lascia passare nei commenti senza escapare.

  - Tutto il contenuto finisce dentro un unico div.article,
    esattamente come in no_elf.html.

================================================================
ESEMPIO:

NO_ELF ~ HCF

<a href="https://spaghetti-hacker.github.io/">&lt;&lt;</a>

;primo commento introduttivo.

;secondo paragrafo del commento.

@@@
0x00400806 push rbp
0x00400807 mov rbp, rsp
@@@

;commento sul blocco qui sopra.

@@@
0x004008ea ret
@@@

;commento finale.
<a href="https://spaghetti-hacker.github.io/">&lt;&lt;</a>
================================================================
-->
<script id="content" type="text/plain">
NO_ELF ~ HCF

<a href="https://spaghetti-hacker.github.io/">&lt;&lt;</a>

;scrivi qui il tuo commento introduttivo.

;un altro paragrafo.

@@@
0x00400806 push rbp
0x00400807 mov rbp, rsp
@@@

;commento sul codice qui sopra.

@@@
0x004008ea ret
@@@

;commento finale.
<a href="https://spaghetti-hacker.github.io/">&lt;&lt;</a>
</script>

<script>
(function(){
    const raw = document.getElementById('content').textContent;
    const lines = raw.split('\n');
    const output = document.getElementById('output');

    let i = 0;

    // salta righe vuote iniziali
    while(i < lines.length && lines[i].trim() === '') i++;

    // prima riga non vuota = titolo
    const title = lines[i] ? lines[i].trim() : '';
    if(title){
        document.title = title + ' | HCF';
    }
    i++;

    // costruisce il contenuto dentro un unico div.article
    // il titolo è il nodo di testo iniziale del box
    let inner = escCode(title);
    i; // già avanzato

    while(i < lines.length){
        const line = lines[i];

        // blocco @@@ → codice pre-wrap
        if(line.trim() === '@@@'){
            i++;
            let block = '';
            while(i < lines.length && lines[i].trim() !== '@@@'){
                block += lines[i] + '\n';
                i++;
            }
            i++; // salta @@@ di chiusura
            // il codice viene escapato tranne &lt; &gt; &amp; già scritti
            inner += escCode(block.replace(/\n$/, ''));
            continue;
        }

        // raccoglie testo fino al prossimo @@@
        let textLines = [];
        while(i < lines.length && lines[i].trim() !== '@@@'){
            textLines.push(lines[i]);
            i++;
        }

        const paragraphs = splitParagraphs(textLines);
        if(paragraphs.length > 0){
            inner += '<div class="commento">\n';
            for(const p of paragraphs){
                // i commenti NON vengono escapati: i link HTML passano interi
                inner += '<p>' + p + '</p>\n';
            }
            inner += '</div>';
        }
    }

    output.innerHTML = '<div class="article">' + inner + '</div>';

    // escapa solo il testo codice (non i commenti che possono avere HTML)
    function escCode(str){
        return str
            .replace(/&(?!(?:amp|lt|gt|quot|#\d+);)/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');
    }

    function splitParagraphs(lines){
        const result = [];
        let current = [];
        for(const line of lines){
            if(line.trim() === ''){
                if(current.length > 0){
                    result.push(current.join('\n'));
                    current = [];
                }
            } else {
                current.push(line);
            }
        }
        if(current.length > 0) result.push(current.join('\n'));
        return result;
    }
})();
</script>
</body>
</html>
