;analisi della funzione initConnection

;il dump del malware che mi ha fornito la Spaghetti Hacker è più grande del solito. Ho quindi deciso di analizzare le singole funzioni che lo compongono; prendi un problema grande e lo scomponi in problemi piccoli.

;nel seguente write-up analizzo la funzione initConnection, estratta tramite radare2 da un binario ELF x86-64 malevolo. L'obiettivo è comprendere il comportamento della funzione attraverso l'esame del disassemblato e ricostruire il codice sorgente equivalente in C.

;la funzione risulta essere il punto di ingresso per la logica di connessione di un bot, presumibilmente di tipo C2 (Command & Control). Come vedremo, il codice implementa un meccanismo di rotazione su una lista di server remoti, con parsing inline dell'indirizzo nel formato host:porta e gestione della connessione con timeout, pattern tipici dei malware botnet.

@@@
[0x00400194]> s sym.initConnection
[0x00403a8a]> pdf
0x00403a8a      push rbp
0x00403a8b      mov rbp, rsp
0x00403a8e      sub rsp, 0x220
@@@

;ha predisposto sullo stack un'area di memoria di 544 byte.
;buffer sovradimensionato, probabilmente per semplicità più che per necessità. Tipico codice non raffinato, molto comune nei malware. Il codice appare riutilizzato o scritto senza particolare attenzione all'ottimizzazione, pratica comune nello sviluppo di malware. Riutilizzare codice è molto comune nell'ambito del malware development.

@@@
0x00403a95      lea rax, [dest]
0x00403a9c      mov rdi, rax                ; void *s
0x00403a9f      mov edx, 0x200              ; 512 ; size_t n
0x00403aa4      mov esi, 0                  ; int c
0x00403aa9      call sym.__GI_memset        ; void *memset(void *s, int c, size_t n)
@@@

;memset(dest,NULL,512)
;ha preparato questo blocco di memoria inizializzata a NULL di 512 byte.
;l'inizializzazione del buffer non mitiga il rischio di overflow introdotto da strcpy.
;il buffer è leggermente più grande dell'area inizializzata, suggerendo allineamento o layout dello stack piuttosto che una scelta intenzionale.

@@@
0x00403aae      mov eax, dword [obj.mainCommSock] ; [0x50e120:4]=0
0x00403ab4      test eax, eax
0x00403ab6      je 0x403acd
@@@

;c'è questo oggetto obj.mainCommSock, oggetto del socket di comunicazione principale? Dovrebbe essere una variabile globale.
;viene testato se è zero o meno, quindi se è presente o meno un socket aperto.
;sta provando una nuova connessione e non vuole connessioni già aperte.

@@@
0x00403ab8      mov edi, dword [obj.mainCommSock] ; [0x50e120:4]=0 ; int fildes
0x00403abe      call sym.__GI_close         ; int close(int fildes)
0x00403ac3      mov dword [obj.mainCommSock], 0 ; [0x50e120:4]=0
@@@

0x00403ae1      jmp 0x403af1

;viene incrementato.

;la logica di aggiornamento di currentServer appare anomala e potenzialmente incompleta, suggerendo che il controllo dei limiti possa essere gestito altrove o che il codice sia soggetto a errori di indexing.

;reversing della funzione in C:

@@@
bool initConnection(void)

{
  int connessione;
  char *colon_ptr;
  char dest [524];
  int porta;

  memset(dest,0,0x200);
  if (mainCommSock != 0) {
    close(mainCommSock);
    mainCommSock = 0;
  }

;se c'era già una connessione aperta, la chiude prima di procedere.

  if (currentServer == 0) {
    currentServer = 0;
  }
  else {
    currentServer = currentServer + 1;
  }

  strcpy(dest,commServer[currentServer]);
  porta = 0x1b46;
  colon_ptr = strchr(dest,0x3a);
  if (colon_ptr != (char *)0x0) {
    colon_ptr = strchr(dest,0x3a);
    porta = atoi(colon_ptr + 1);
    colon_ptr = strchr(dest,0x3a);
    *colon_ptr = '\0';
  }
@@@

;viene cercato il carattere ":" nella stringa, il numero dopo i due punti viene convertito con atoi() come porta, poi il ":" viene sovrascritto con \0,  spezzando la stringa in modo che dest contenga solo l'hostname.

;0x1b46 = 6982, porta di default, potrebbe essere una porta IRC non standard (IRC standard è 6667). Potrebbe trattarsi di un C2 (Command & Control).

@@@
  mainCommSock = socket(2,1,0);
  connessione = connectTimeout(mainCommSock,dest,porta,0x1e);
  return connessione == 0;
}
@@@

;questa funzione è tipica di un client C2 con lista di server di fallback (failover list). Il pattern commServer[] come array di stringhe "host:porta" è classico dei bot Mirai o bot DDoS. La logica di rotazione dei server suggerisce un tentativo di resilienza delegato alla logica esterna: se un server C2 cade, il bot prova il successivo.

;in radare2, il prefisso obj. indica variabili globali (o statiche) identificate dall'analisi, non sono oggetti nel senso OOP, è solo la convenzione di naming di r2 per distinguerle dalle funzioni (sym.) e dalle stringhe (str.).

;obj.mainCommSockint (file descriptor) Il socket TCP aperto verso il C2
;obj.currentServerint (indice) Indice corrente nell'array di server, forse inizializzato a -1
;obj.commServerchar*[] (array di puntatori a stringhe) La lista dei server C2 nel formato "host:porta"

@@@
[0x00403a8a]> pxr 8 @ obj.commServer
0x0050dbe0 0x000000000040b760   `.@..... @ obj.commServer 4241248 .rodata str.5.2.65.150:999,section..rodata,.rodata R X 'xor eax, 0x362e322e' 5.2.65.150:999
@@@

;IoC
;5.2.65.150:999

;l'analisi di initConnection rivela una funzione compatta ma significativa dal punto di vista comportamentale. Il bot implementa una failover list di server C2 nell'array commServer[], iterando sequenzialmente sugli indirizzi disponibili (senza bounds checking visibile), in caso di mancata connessione. Il formato host:porta viene parsato manualmente con tre chiamate a strchr(), una scelta implementativa rudimentale ma efficace.

;la funzione implementa un singolo tentativo di connessione su un server selezionato sequenzialmente; il comportamento di failover emerge solo nel contesto delle chiamate ripetute da parte del codice chiamante.

;l'indirizzo estratto dalla memoria, 5.2.65.150:999, e la porta di default 6982 (0x1b46), è compatibile con pattern osservati in diverse botnet (es. Mirai e derivati).

;questa funzione non implementa l'intero meccanismo di comunicazione, ma espone chiaramente il modello operativo: selezione sequenziale dei target, parsing minimale e tentativi di connessione isolati, delegando la resilienza alla logica esterna.

;il comportamento osservato suggerisce una progettazione minimale, in cui la funzione si limita a un singolo tentativo di connessione, mentre la gestione del failover è interamente demandata al codice chiamante.

<script>
(function(){
    const raw = document.getElementById('content').textContent;
    const lines = raw.split('\n');
    const output = document.getElementById('output');

    let i = 0;

    // salta righe vuote iniziali
    while(i < lines.length && lines[i].trim() === '') i++;

    // prima riga non vuota = titolo
    const title = lines[i] ? lines[i].trim() : '';
    if(title){
        document.title = title;
    }
    i++;

    // costruisce il contenuto dentro un unico div.article
    // il titolo è il nodo di testo iniziale del box
    let inner = escCode(title);
    i; // già avanzato

    while(i < lines.length){
        const line = lines[i];

        // blocco @@@ → codice pre-wrap
        if(line.trim() === '@@@'){
            i++;
            let block = '';
            while(i < lines.length && lines[i].trim() !== '@@@'){
                block += lines[i] + '\n';
                i++;
            }
            i++; // salta @@@ di chiusura
            // il codice viene escapato tranne &lt; &gt; &amp; già scritti
            //inner += escCode(block.replace(/\n$/, ''));
	    inner += '<pre class="codeblock">' + escCode(block.replace(/\n$/, '')) + '</pre>';
            continue;
        }

        // raccoglie testo fino al prossimo @@@
        let textLines = [];
        while(i < lines.length && lines[i].trim() !== '@@@'){
            textLines.push(lines[i]);
            i++;
        }

        const paragraphs = splitParagraphs(textLines);
        if(paragraphs.length > 0){
	    inner += '<div class="commento">\n';
            for (const p of paragraphs){
                const cleaned = p.replace(/\n/g, '<br>');
                inner += '<p>' + cleaned + '</p>\n';
                }
            inner += '</div>';
        }
    }

    output.innerHTML = '<div class="article">' + inner + '</div>';

    // escapa solo il testo codice (non i commenti che possono avere HTML)
    function escCode(str){
        return str
            .replace(/&(?!(?:amp|lt|gt|quot|#\d+);)/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');
    }

    function splitParagraphs(lines){
        const result = [];
        let current = [];
        for(const line of lines){
            if(line.trim() === ''){
                if(current.length > 0){
                    result.push(current.join('\n'));
                    current = [];
                }
            } else {
                current.push(line);
            }
        }
        if(current.length > 0) result.push(current.join('\n'));
        return result;
    }
})();
</script>
